    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --navy: #0f172a; --anchor-gold: #fbbf24; }
        body { font-family: 'Assistant', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; touch-action: manipulation; }
        .glass-header { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border-bottom: 3px solid var(--anchor-gold); }
        .modern-card { background: #1e293b; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gold { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); color: #0f172a; }
        .btn-navy { background: linear-gradient(135deg, #334155 0%, #1e293b 100%); color: white; border: 1px solid rgba(255,255,255,0.1); }

        .filter-btn { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.1); }

        .official-print-wrapper { display: flex; flex-direction: column; width: 100%; max-width: 210mm; margin: 0 auto; background: white !important; padding: 10mm; box-sizing: border-box; color: black !important; font-family: 'Assistant', sans-serif !important; }
        .official-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 5px double #000 !important; padding-bottom: 8px; margin-bottom: 10px; }
        .header-right { text-align: right; } .header-left { text-align: left; }
        .school-name { font-size: 24px; font-weight: 900; color: #000 !important; margin: 0; letter-spacing: -0.5px; line-height: 1.2; }
        .report-title { font-size: 20px; font-weight: 900; color: #000 !important; margin: 4px 0 0 0; }
        .meta-text { font-size: 14px; font-weight: 800; color: #000 !important; margin-top: 4px; }
        .table-container { width: 100%; flex-grow: 1; display: flex; flex-direction: column; }
        .official-table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; border: 3px solid #000 !important; background: white !important; }
        .official-table th { background-color: #cbd5e1 !important; color: #000 !important; font-weight: 900 !important; font-size: 15px !important; padding: 8px 4px !important; border: 2px solid #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        .official-table tr:nth-child(even) td { background-color: #f1f5f9 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .official-footer { display: flex; justify-content: space-between; align-items: flex-end; border-top: 3px solid #000 !important; padding-top: 15px; margin-top: 15px; }
        .summary-box { font-size: 18px; font-weight: 800; color: #000 !important; } .summary-box b { font-size: 22px; font-weight: 900; color: #000 !important; }

            .official-table { width: 100% !important; height: 100% !important; }
            .official-table th { font-size: 11pt !important; padding: 2px !important; height: 1px !important; }
            .official-table td { font-size: clamp(8pt, 1.8vh, 12pt) !important; padding: 1px 2px !important; }
            .school-name { font-size: 16pt !important; margin: 0 !important;} .report-title { font-size: 14pt !important; margin: 0 !important;}
            .meta-text { font-size: 10pt !important; margin: 0 !important;} .summary-box { font-size: 12pt !important; } .summary-box b { font-size: 14pt !important; }

            .signer-role { font-size: 10pt !important; }
        }

        .emergency-bg { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { background-color: #7f1d1d; } 50% { background-color: #b91c1c; } 100% { background-color: #7f1d1d; } }
        .toast-popup { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 15px 30px; border-radius: 50px; font-weight: 900; font-size: 1.2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 9999; animation: slideDown 0.5s ease-out; }
        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } }
        
        .tab-btn { flex: 1; py-3; text-center; font-weight: 900; transition: all 0.3s; border-bottom: 3px solid transparent; color: #94a3b8; }

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = { apiKey: "AIzaSyCbUcZeBHsZDy3AvYLYe8OZ4nGQ3v3_E-U", databaseURL: "https://misdar-acco-default-rtdb.europe-west1.firebasedatabase.app" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        // ה-UID של המנהל שיצרת:
        const ADMIN_UID = "SUceoKbR1ZeJSnJeFegNPJOAA5Z2";

        const MajorsList = ["מכונה", "חובל משמרת", "אלקטרוניקה", "לוגיסטיקת נמלים"];
        const ROLE_TYPES = { kadar: 'קד"ר', madrich: 'מדריך', ab_bayit: 'אב בית', kabat: 'קב"ט', firefighter: 'כבאי', medic: 'מע"ר', scanner: 'סורק', safety_comm: 'מפקד ביטחון בטיחות', officer: 'קצין תורן', kmz: 'ק.מ.ז', cadet_comm: 'מפקד קדטים', deputy_comm: 'סגן מפקד קדטים', village_mgr: 'מנהל הכפר' };
        
        const EMERGENCY_ROLES = ['kabat', 'safety_comm', 'scanner', 'medic', 'firefighter'];
        const VALID_CLASSES = ["א/1", "א/2", "א/3", "ב/1", "ב/2", "ב/3", "ב/4", "ג/1", "ג/2", "ג/3", "ג/4", "ד/1", "ד/2", "ד/3", "ד/4"];
        const extractClassFromName = (nameStr) => {
            if (!nameStr) return "";
            for (let c of VALID_CLASSES) {
                if (nameStr.includes(c)) return c;
            }
            return "";
        };

        const NOTES_PRESENCE = ["חולה בבית", "נעדר", "חופשה מיוחדת", "מושעה", "תיגבור", "תורנות", "אחר (מוצדק)"];
        const NOTES_MORNING = ["חולה בבית", "חופשה מיוחדת", "חדר חולים", "מסדר חולים", "פרגולה", "מסדר חוץ", "ק.מ", "ק.מ.ז", "דגלן", "הגברה", "תורנות", "שעת אפס"];
        const MORNING_COUNTS_AS_PRESENT = ["הגברה", "דגלן", "ק.מ", "מסדר חוץ", "ק.מ.ז"];
        const ROOM_CHECKS = ["סדר כללי", "מיטות", "שולחנות", "מראה", "אורות", "שטיפה", "פח", "מקלחת", "כיור", "שירותים", "מטען", "מזגן"];

        const generateRandomCode = () => Math.floor(100000 + Math.random() * 900000).toString();
        const AnchorIcon = ({ size = 24, color = "currentColor" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5V21M5 12H2M22 12h-3M12 5c-3.31 0-6 2.69-6 6 0 3.1 2.31 5.67 5.33 5.97M12 5c3.31 0 6 2.69 6 6 0 3.1-2.31 5.67-5.33 5.97M7 21h10"/><circle cx="12" cy="5" r="2"/></svg>
        );

        const generateQR = (text) => { 
            try { 
                if (!text) return "";
                const qr = new QRious({ value: text, size: 800, level: 'M' });
                return qr.toDataURL(); 
            } catch (e) { return ""; } 
        };

        const compressReportForQR = (payload) => {
            const minified = JSON.stringify({
                _t: payload.type, _a: payload.author, _s: payload.signerName || "", _ur: payload.userRole || "", _ts: payload.timestamp,
                _r: payload.rows ? payload.rows.map(r => [r.name || r.id, r.class || "", r.isPresent ? 1 : 0, r.note === 'אושר שחרור' ? 'א' : (r.note || "")]) : []
            });
            return LZString.compressToBase64(minified);
        };

        const compressBulkReports = (reportsArr) => {
            const minifiedArr = reportsArr.map(payload => ({
                _t: payload.type, _a: payload.author, _s: payload.signerName || "", _ur: payload.userRole || "", _ts: payload.timestamp,
                _r: payload.rows ? payload.rows.map(r => [r.name || r.id, r.class || "", r.isPresent ? 1 : 0, r.note || ""]) : []
            }));
            return LZString.compressToBase64(JSON.stringify(minifiedArr));
        };

        const decompressQRData = (dataStr) => {
            let parsed;
            try {
                let decomp = LZString.decompressFromBase64(dataStr);
                if (!decomp) decomp = LZString.decompressFromEncodedURIComponent(dataStr);
                parsed = JSON.parse(decomp || dataStr); 
            } catch(e) { throw new Error("קריסת פענוח. הברקוד פגום או לא קריא לחלוטין."); }

            const mapReport = (p) => ({
                reportId: `offline_report_${p._ts}`, type: p._t, author: p._a, signerName: p._s, userRole: p._ur || p._a, timestamp: p._ts,
                totalStudents: p._r ? p._r.length : 0, totalPresent: p._r ? p._r.filter(r => r[2] === 1).length : 0, signature: null, 
                rows: p._r ? p._r.map(r => ({id: Math.random().toString(), name: r[0], class: r[1], isPresent: r[2] === 1, note: r[3] === 'א' ? 'אושר שחרור' : r[3]})) : []
            });
            if (Array.isArray(parsed)) return parsed.map(mapReport);
            else return mapReport(parsed);
        };

        // --- רכיב כניסה מעודכן למערכת (Auth + PIN) ---
        const LoginView = ({ isEmergency, onPinAttempt, onAuthAttempt }) => {
            const [loginMode, setLoginMode] = useState('pin'); // 'pin' or 'auth'
            const [inputCode, setInputCode] = useState("");
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(false);

            const handlePinClick = () => { onPinAttempt(inputCode); setInputCode(""); };
            const handleAuthClick = async () => {
                if(!email || !password) return alert("יש להזין אימייל וסיסמה.");
                setLoading(true);
                await onAuthAttempt(email, password);
                setLoading(false);
            };

            return (
                <div className={`flex flex-col items-center justify-center min-h-screen p-6 no-print ${isEmergency ? 'emergency-bg' : 'bg-[#0f172a]'}`}>
                    <div className="bg-amber-400 p-5 rounded-3xl text-navy mb-6 shadow-2xl"><AnchorIcon size={56} /></div>
                    <h1 className="text-3xl font-black mb-1 text-white text-center">קציני ים עכו</h1>
                    <h2 className="text-slate-400 font-bold mb-6 text-sm">מערכת ניהול - Enterprise</h2>
                    
                    {isEmergency && <div className="bg-red-600 text-white font-black px-6 py-3 rounded-xl mb-6 animate-pulse text-xl shadow-[0_0_20px_rgba(220,38,38,0.8)]">🚨 מצב חירום מופעל 🚨</div>}
                    
                    <div className="w-full max-w-sm bg-slate-800 rounded-3xl overflow-hidden shadow-2xl border border-slate-700">
                        <div className="flex border-b border-slate-700">
                            <button onClick={() => setLoginMode('pin')} className={`flex-1 py-4 text-center font-black transition-colors ${loginMode === 'pin' ? 'bg-slate-700 text-amber-400 border-b-2 border-amber-400' : 'text-slate-400 hover:text-white'}`}>קד"רים (קוד)</button>
                            <button onClick={() => setLoginMode('auth')} className={`flex-1 py-4 text-center font-black transition-colors ${loginMode === 'auth' ? 'bg-slate-700 text-emerald-400 border-b-2 border-emerald-400' : 'text-slate-400 hover:text-white'}`}>סגל (מאובטח)</button>
                        </div>
                        
                        <div className="p-6 space-y-4">
                            {loginMode === 'pin' ? (
                                <>
                                    <p className="text-slate-300 text-sm font-bold text-center mb-4">התחברות באמצעות קוד גישה לדיווחי קד"ר תורן</p>
                                    <input type="tel" placeholder="הקלד קוד גישה..." className="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 text-white text-center text-xl font-black outline-none focus:border-amber-400" value={inputCode} onChange={e => setInputCode(e.target.value)} />
                                    <button onClick={handlePinClick} className="w-full btn-gold py-4 rounded-xl font-black text-xl shadow-lg hover:shadow-xl transition">כניסה למסדר</button>
                                </>
                            ) : (
                                <>
                                    <p className="text-slate-300 text-sm font-bold text-center mb-4">התחברות סגל מורשה באמצעות דוא"ל</p>
                                    <input type="email" placeholder="אימייל ארגוני" className="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 text-white text-left text-lg font-bold outline-none focus:border-emerald-400" dir="ltr" value={email} onChange={e => setEmail(e.target.value)} />
                                    <input type="password" placeholder="סיסמה" className="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 text-white text-left text-lg font-bold outline-none focus:border-emerald-400" dir="ltr" value={password} onChange={e => setPassword(e.target.value)} />
                                    <button disabled={loading} onClick={handleAuthClick} className="w-full bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white py-4 rounded-xl font-black text-xl shadow-lg transition">
                                        {loading ? "מתחבר..." : "התחברות למערכת"}
                                    </button>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- שאר הרכיבים זהים לחלוטין לקודם כדי לא לשבור שום דבר ---
        const EmergencyComms = ({ userRole }) => {
            const [msg, setMsg] = useState(""); const [comms, setComms] = useState([]);
            useEffect(() => { const ref = database.ref('system/comms').limitToLast(15); ref.on('value', snap => { const data = snap.val(); if(data) setComms(Object.values(data).reverse()); else setComms([]); }); return () => ref.off(); }, []);
            const sendMsg = () => { if(!msg.trim()) return; database.ref('system/comms').push({ text: msg, author: userRole, time: new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'}) }); setMsg(""); };
            return (
                <div className="modern-card p-4 border-t-4 border-red-500 bg-slate-800">
                    <h3 className="font-black text-white text-sm mb-3 flex items-center gap-2"><span className="text-red-500">🔴</span> רשת קשר כוחות חירום</h3>
                    <div className="flex gap-2 mb-3">
                        <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyPress={e => e.key === 'Enter' && sendMsg()} placeholder="הודעה לכלל הכוחות..." className="flex-1 p-3 border border-slate-600 rounded-xl bg-slate-700 text-white font-bold outline-none focus:border-red-500 text-sm" />
                        <button onClick={sendMsg} className="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-xl font-bold shadow transition">שלח</button>
                    </div>
                    <div className="space-y-2 max-h-40 overflow-y-auto pr-1">
                        {comms.length === 0 && <div className="text-slate-500 text-xs text-center font-bold">רשת הקשר שקטה.</div>}
                        {comms.map((c, i) => <div key={i} className="bg-slate-700/50 p-2 rounded-lg text-sm border border-slate-600/50"><span className="text-slate-400 text-xs font-mono">[{c.time}]</span> <span className="font-bold text-amber-400">{c.author}:</span> <span className="text-slate-200 font-bold">{c.text}</span></div>)}
                    </div>
                </div>
            );
        };

        const ReportViewerModal = ({ report, onClose }) => {
            if (!report) return null;
            const dateStr = new Date(report.timestamp).toLocaleDateString('he-IL'); const timeStr = new Date(report.timestamp).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
            return (
                <div className="fixed inset-0 bg-black/95 z-[9999] overflow-y-auto p-4 md:p-8 no-print-bg print-modal-fix">
                    <div className="no-print mb-6 text-center max-w-3xl mx-auto flex justify-center gap-3 mt-4 bg-slate-800 p-4 rounded-2xl shadow-lg border border-slate-600">
                        <button onClick={() => window.print()} className="flex-1 bg-emerald-500 hover:bg-emerald-400 text-slate-900 px-6 py-4 rounded-xl font-black text-lg shadow-lg transition">🖨️ שמור כ-PDF / הדפס</button>
                        <button onClick={onClose} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white px-6 py-4 rounded-xl font-bold transition">סגור תצוגה</button>
                    </div>
                    <div className="official-print-wrapper shadow-2xl print:shadow-none">

            const handleToggle = (id) => { const current = formState[id] || { status: false, note: '', customNote: '' }; setFormState({ ...formState, [id]: { ...current, status: !current.status } }); };

        };

        const KabatView = ({ userRole, isEmergency, systemAlerts, cloudReports, handleLogout }) => {
            const activeAlerts = Object.entries(systemAlerts || {}).filter(([k,v]) => v.active); const emergencyReports = cloudReports.filter(r => r.type && r.type.includes('חירום')); const [selectedReport, setSelectedReport] = useState(null);
            return (
                <div className="min-h-screen pb-20"><header className="bg-slate-800 text-white p-6 rounded-b-3xl shadow-lg mb-6 flex justify-between items-center"><div><h1 className="text-2xl font-black text-amber-400">ביטחון</h1></div><button onClick={handleLogout} className="bg-slate-700 px-3 py-1 rounded">התנתק</button></header>
                    <div className="p-4 max-w-xl mx-auto space-y-6">
                        <EmergencyComms userRole={userRole} />
                        <div className={`p-6 rounded-3xl ${isEmergency ? 'bg-red-900' : 'bg-slate-800'}`}><button onClick={() => database.ref('system/emergency').set(!isEmergency)} className={`w-full py-5 rounded-2xl font-black text-xl ${isEmergency ? 'bg-white text-red-700' : 'bg-red-600 text-white'}`}>{isEmergency ? 'חזל"ש' : 'הפעל חירום'}</button></div>
                    </div>
                    {selectedReport && <ReportViewerModal report={selectedReport} onClose={() => setSelectedReport(null)} />}
                </div>
            );
        };

        const OfficerView = ({ userRole, accessCodes, offlineReports, setOfflineReports, cloudReports, handleLogout }) => {
            const officerReports = cloudReports.filter(r => r.type && !r.type.includes('חירום')); const [selectedReport, setSelectedReport] = useState(null);
            return (
                <div className="min-h-screen pb-20"><header className="bg-slate-800 text-white p-6 flex justify-between"><div><h1 className="text-2xl font-black text-amber-400">קצין תורן</h1></div><button onClick={handleLogout} className="bg-slate-700 px-3 py-1 rounded">יציאה</button></header>
                    <div className="p-4 max-w-xl mx-auto space-y-6"><div className="modern-card p-6 border-t-4 border-purple-500"><div className="max-h-60 overflow-y-auto space-y-2">{officerReports.map(r => (<div key={r.reportId} className="bg-slate-700 p-3 flex justify-between"><div className="text-white">{r.author}</div><button onClick={() => setSelectedReport(r)} className="bg-slate-800 text-white px-3 py-1 rounded">צפה</button></div>))}</div></div></div>
                    {selectedReport && <ReportViewerModal report={selectedReport} onClose={() => setSelectedReport(null)} />}
                </div>
            );
        };

        const KmzView = ({ userRole, handleLogout }) => {
            const [patients, setPatients] = useState([]); const [form, setForm] = useState({name:'', class:'', timeIn:''}); const [showQR, setShowQR] = useState(false); const [qrPayload, setQrPayload] = useState(""); const [signerName, setSignerName] = useState(""); const canvasRef = useRef(null); const [isDrawing, setIsDrawing] = useState(false);
            const startDrawing = (e) => { if(!canvasRef.current) return; const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000'; const rect = canvasRef.current.getBoundingClientRect(); const offsetX = (e.touches && e.touches[0]) ? e.touches[0].clientX - rect.left : e.nativeEvent.offsetX; const offsetY = (e.touches && e.touches[0]) ? e.touches[0].clientY - rect.top : e.nativeEvent.offsetY; ctx.moveTo(offsetX, offsetY); setIsDrawing(true); };
            const draw = (e) => { if (!isDrawing || !canvasRef.current) return; const rect = canvasRef.current.getBoundingClientRect(); const offsetX = (e.touches && e.touches[0]) ? e.touches[0].clientX - rect.left : e.nativeEvent.offsetX; const offsetY = (e.touches && e.touches[0]) ? e.touches[0].clientY - rect.top : e.nativeEvent.offsetY; canvasRef.current.getContext('2d').lineTo(offsetX, offsetY); canvasRef.current.getContext('2d').stroke(); };
            const stopDrawing = () => setIsDrawing(false); const clearSignature = () => { if(canvasRef.current) canvasRef.current.getContext('2d').clearRect(0, 0, 320, 150); };
            const addPatient = () => { if(!form.name) return; setPatients([...patients, {...form, id: generateRandomCode(), timeOut: ''}]); setForm({name:'', class:'', timeIn:''}); };
            const finish = async () => { const payload = { reportId: 'rep_מרפאה', author: userRole, signerName: signerName, userRole: userRole, type: 'kmz', timestamp: new Date().getTime(), rows: patients, signature: canvasRef.current ? canvasRef.current.toDataURL("image/png") : null }; try { await database.ref(`reports_cloud/${payload.reportId}`).set(payload); } catch(e) {} setQrPayload(compressReportForQR(payload)); setShowQR(true); setPatients([]); };

            return (
                <div className="min-h-screen pb-24"><header className="bg-emerald-900 text-white p-6 flex justify-between"><div><h1 className="text-2xl font-black">מרפאה</h1></div><button onClick={handleLogout} className="bg-emerald-800 px-3 py-1 rounded">יציאה</button></header>
                    <main className="p-4 max-w-md mx-auto space-y-4"><div className="modern-card p-6"><input value={form.name} onChange={e=>setForm({...form, name:e.target.value})} placeholder="שם" className="w-full p-4 bg-slate-700 text-white mb-3" /><button onClick={addPatient} className="w-full bg-emerald-600 text-white py-4 rounded-xl">הוסף</button></div>
                    {patients.length > 0 && <div className="modern-card p-6 border-t-4 border-emerald-500"><input className="w-full p-4 bg-slate-700 text-white mb-4" placeholder="שם חובש" value={signerName} onChange={e => setSignerName(e.target.value)} /><canvas ref={canvasRef} width={320} height={150} className="signature-canvas w-full mb-2" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} /></div>}
                    </main>
                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-slate-800"><button disabled={patients.length===0} onClick={finish} className="w-full btn-gold py-4 rounded-xl">שלח</button></div>
                    {showQR && <div className="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center"><img src={generateQR(qrPayload)} className="bg-white p-4" /><button onClick={() => setShowQR(false)} className="mt-8 text-white">סגור</button></div>}
                </div>
            );
        };

        const ScannerView = ({ userRole, offlineReports, setOfflineReports, handleLogout }) => {
            const [txt, setTxt] = useState(""); const [showQRS, setShowQRS] = useState(false);
            const sendAlert = () => { if(!txt) return; database.ref('system/alerts').push({ text: txt, time: new Date().toLocaleTimeString('he-IL'), active: true, author: userRole }); setTxt(""); alert("ההודעה שודרה."); };
            return (
                <div className="min-h-screen pb-20"><header className="mb-8 bg-slate-800 p-6 flex justify-between"><h2 className="text-2xl text-white">{userRole}</h2><button onClick={handleLogout} className="bg-slate-700 text-white px-4 py-2 rounded-xl">התנתק</button></header><div className="p-4 max-w-md mx-auto space-y-6"><EmergencyComms userRole={userRole} /><div className="modern-card p-6"><input value={txt} onChange={e=>setTxt(e.target.value)} placeholder="דיווח..." className="w-full p-4 bg-slate-700 text-white mb-4" /><button onClick={sendAlert} className="w-full btn-gold py-4 rounded-xl">שדר</button></div></div></div>
            );
        };

        const MedicView = ({ userRole, userType, offlineReports, setOfflineReports, handleLogout }) => {
            const [showQRS, setShowQRS] = useState(false); const [showQRTransfer, setShowQRTransfer] = useState(false);
            return (
                <div className="min-h-screen pb-20"><header className="mb-8 bg-slate-800 p-6 flex justify-between"><h2 className="text-2xl text-white">{userRole}</h2><button onClick={handleLogout} className="bg-slate-700 text-white px-4 py-2">התנתק</button></header><div className="p-4 max-w-md mx-auto space-y-6"><EmergencyComms userRole={userRole} /><div className="modern-card p-8 text-center"><button onClick={()=>setShowQRS(true)} className="w-full bg-red-600 text-white py-4 rounded-xl">סריקה</button></div></div></div>
            );
        };

        const ManagementView = ({ userRole, students, isEmergency, systemAlerts, cloudReports, handleLogout }) => {
            const [selectedReport, setSelectedReport] = useState(null);
            return (
                <div className="min-h-screen pb-20"><header className="mb-6 bg-slate-800 text-white p-6 flex justify-between"><h1 className="text-2xl text-amber-400">פיקוד עליון</h1><button onClick={handleLogout} className="bg-slate-700 px-3 py-1 rounded">התנתק</button></header><div className="p-4 max-w-xl mx-auto space-y-4"><div className="grid grid-cols-2 gap-4"><div className="modern-card p-6 text-center text-white"><div className="text-5xl">{students.length}</div><div>חניכים</div></div></div></div></div>
            );
        };

        // --- ליבת האפליקציה עם מנגנון ההזדהות (Auth) ---
       // --- ליבת האפליקציה עם מנגנון ההזדהות (Auth) מתוקן ---
        function App() {
            const [view, setView] = useState("login");
            const [userRole, setUserRole] = useState("");
            const [userType, setUserType] = useState("");
            const [userCode, setUserCode] = useState("");
            
            const [students, setStudents] = useState([]);
            const [accessCodes, setAccessCodes] = useState({});
            
            const [isEmergency, setIsEmergency] = useState(false);
            const [systemAlerts, setSystemAlerts] = useState({});
            const [popupMsg, setPopupMsg] = useState("");
            
            const [offlineReports, setOfflineReports] = useState([]);
            const [cloudReports, setCloudReports] = useState([]);

            // 1. התיקון: האזנה מופרדת למצב ההתחברות כדי למנוע לולאה
            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged(user => {
                    if (user) {
                        // הוספנו פה בדיקה: אל תנווט אלא אם המשתמש נמצא במסך ה'לוגין'
                        setView(currentView => {
                            if (currentView === "login") {
                                if (user.uid === ADMIN_UID) {
                                    setUserRole("מנהל מערכת ראשי (Auth)");
                                    setUserType("god");
                                    setUserCode("GOD");
                                    return "god_mode";
                                } else {
                                    setUserRole(user.email);
                                    setUserType("officer");
                                    setUserCode("AUTH_USER");
                                    return "officer_dash";
                                }
                            }
                            // אם הוא כבר בתוך המערכת ולחץ על תפקיד אחר - אל תגע!
                            return currentView; 
                        });
                    }
                });
                return () => unsubscribeAuth();
            }, []); // <--- המערך הריק מבטיח שזה לא ירענן את עצמו כשתחליף תפקיד

            // 2. שאר ההאזנות לנתוני המערכת
            useEffect(() => {
                const studentsRef = database.ref('students');
                studentsRef.on('value', snap => { const data = snap.val(); if (!data) { setStudents([]); return; } const cleanList = Object.keys(data).map(k => ({ ...data[k], id: k, status: (data[k].isDone && data[k].status === 'ממתין') ? 'נוכח' : (data[k].status || 'ממתין') })); setStudents(cleanList); });
                const codesRef = database.ref('access_codes'); codesRef.on('value', snap => setAccessCodes(snap.val() || {}));
                const emergencyRef = database.ref('system/emergency'); emergencyRef.on('value', snap => setIsEmergency(snap.val() || false));
                const alertsRef = database.ref('system/alerts'); alertsRef.on('value', snap => { const data = snap.val() || {}; setSystemAlerts(data); if (['kabat', 'safety_comm'].includes(userType)) { const newAlerts = Object.values(data).filter(a => a.active); if (newAlerts.length > 0) { setPopupMsg(`📍 סריקה: ${newAlerts[newAlerts.length - 1].text}`); setTimeout(() => setPopupMsg(""), 5000); } } });
                const commsRef = database.ref('system/comms'); let initialCommsLoaded = false; commsRef.once('value').then(() => initialCommsLoaded = true); commsRef.on('child_added', snap => { if (!initialCommsLoaded) return; const data = snap.val(); if (EMERGENCY_ROLES.includes(userType)) { setPopupMsg(`🔴 ${data.author}: ${data.text}`); setTimeout(() => setPopupMsg(""), 6000); } });
                const reportsRef = database.ref('reports_cloud'); reportsRef.on('value', snap => { const data = snap.val(); if(data) { setCloudReports(Object.values(data).sort((a,b) => b.timestamp - a.timestamp)); } else { setCloudReports([]); } });
                
                return () => { studentsRef.off(); codesRef.off(); emergencyRef.off(); alertsRef.off(); reportsRef.off(); commsRef.off(); };
            }, [userType]);

            const handleLogout = () => { 
                auth.signOut().then(() => {
                    setUserRole(""); setUserType(""); setUserCode(""); setView("login"); 
                });
            };

            const setGodRole = (rType, rName) => {
                setUserRole(`${rName} (God Mode)`); setUserType(rType); setUserCode("GOD_MODE_USER");
                if (rType === 'admin') setView("admin"); 
                else if (rType === 'madrich') setView("madrich_dash"); 
                else if (rType === 'kadar') setView("kadar_menu"); 
                else if (rType === 'ab_bayit') setView("ab_bayit"); 
                else if (['kabat', 'safety_comm'].includes(rType)) setView("kabat_dash"); 
                else if (rType === 'scanner') setView("scanner_dash"); 
                else if (['firefighter', 'medic'].includes(rType)) setView("medic_dash"); 
                else if (rType === 'officer') setView("officer_dash"); 
                else if (rType === 'kmz') setView("kmz_dash"); 
                else if (['cadet_comm', 'deputy_comm', 'village_mgr'].includes(rType)) setView("management_dash"); 
                else setView("kadar_menu");
            };

            const handlePinAttempt = (inputCode) => {
                if (accessCodes && accessCodes[inputCode]) {
                    const codeData = accessCodes[inputCode];
                    const rName = typeof codeData === 'object' ? codeData.name : codeData;
                    const rType = typeof codeData === 'object' ? codeData.type : 'kadar';
                    setUserRole(rName); setUserType(rType); setUserCode(inputCode);
                    setView("kadar_menu");
                } else { alert("קוד הגישה שגוי או אינו קיים במערכת."); }
            };

            const handleAuthAttempt = async (email, password) => {
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch(error) {
                    alert("שגיאת התחברות: " + error.message);
                }
            };

            const renderCurrentView = () => {
                try {
                    switch(view) {
                        case "login": return <LoginView isEmergency={isEmergency} onPinAttempt={handlePinAttempt} onAuthAttempt={handleAuthAttempt} />;
                        case "admin": return <AdminView accessCodes={accessCodes} students={students} handleLogout={handleLogout} />;
                        case "god_mode": return <GodModeView setGodRole={setGodRole} handleLogout={handleLogout} />;
                        case "madrich_dash": return <MadrichView userRole={userRole} userCode={userCode} accessCodes={accessCodes} students={students} cloudReports={cloudReports} setView={setView} handleLogout={handleLogout} />;
                        case "kadar_menu": return <KadarMenu userRole={userRole} userType={userType} isEmergency={isEmergency} setView={setView} handleLogout={handleLogout} />;
                        case "kadar_form_nochachut": return <KadarForm userRole={userRole} userType={userType} userCode={userCode} accessCodes={accessCodes} students={students} formType="nochachut" setView={setView} />;
                        case "kadar_form_kibui_orot": return <KadarForm userRole={userRole} userType={userType} userCode={userCode} accessCodes={accessCodes} students={students} formType="kibui_orot" setView={setView} />;
                        case "kadar_form_boker": return <KadarForm userRole={userRole} userType={userType} userCode={userCode} accessCodes={accessCodes} students={students} formType="boker" setView={setView} />;
                        case "kadar_form_knisa": return <KadarForm userRole={userRole} userType={userType} userCode={userCode} accessCodes={accessCodes} students={students} formType="knisa" setView={setView} />;
                        case "kadar_form_emergency": return <KadarForm userRole={userRole} userType={userType} userCode={userCode} accessCodes={accessCodes} students={students} formType="emergency" setView={setView} />;
                        case "kadar_exit_original": return <OriginalExitApp globalStudents={students} userRole={userRole} goBack={() => setView(userType === 'madrich' ? "madrich_dash" : "kadar_menu")} />;
                        case "ab_bayit": return <AbBayitView userRole={userRole} handleLogout={handleLogout} />;
                        case "kabat_dash": return <KabatView userRole={userRole} isEmergency={isEmergency} systemAlerts={systemAlerts} cloudReports={cloudReports} handleLogout={handleLogout} />;
                        case "scanner_dash": return <ScannerView userRole={userRole} offlineReports={offlineReports} setOfflineReports={setOfflineReports} handleLogout={handleLogout} />;
                        case "medic_dash": return <MedicView userRole={userRole} userType={userType} offlineReports={offlineReports} setOfflineReports={setOfflineReports} handleLogout={handleLogout} />;
                        case "officer_dash": return <OfficerView userRole={userRole} accessCodes={accessCodes} offlineReports={offlineReports} setOfflineReports={setOfflineReports} cloudReports={cloudReports} handleLogout={handleLogout} />;
                        case "kmz_dash": return <KmzView userRole={userRole} handleLogout={handleLogout} />;
                        case "management_dash": return <ManagementView userRole={userRole} students={students} isEmergency={isEmergency} systemAlerts={systemAlerts} cloudReports={cloudReports} handleLogout={handleLogout} />;
                        default: return <LoginView isEmergency={isEmergency} onPinAttempt={handlePinAttempt} onAuthAttempt={handleAuthAttempt} />;
                    }
                } catch (error) { return <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white font-bold text-center p-8">אירעה שגיאה בטעינת המסך. אנא רענן את הדף.</div>; }
            };

            return (
                <>
                    {popupMsg && <div className="toast-popup" style={{backgroundColor: popupMsg.includes('🔴') ? '#dc2626' : '#f59e0b'}}>{popupMsg}</div>}
                    {renderCurrentView()}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>
</body>
</html>
