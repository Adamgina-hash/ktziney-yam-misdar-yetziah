<!DOCTYPE html>

<head>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --navy: #0f172a; --anchor-gold: #fbbf24; }
        body { font-family: 'Assistant', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; touch-action: manipulation; }
        
        .glass-header { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border-bottom: 3px solid var(--anchor-gold); }
        .modern-card { background: #1e293b; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gold { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); color: #0f172a; }
        .btn-navy { background: linear-gradient(135deg, #334155 0%, #1e293b 100%); color: white; border: 1px solid rgba(255,255,255,0.1); }
        
        .active-filter { background: var(--anchor-gold) !important; color: var(--navy) !important; transform: translateY(-1px); font-weight: 800; }
        .filter-btn { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .signature-canvas { border: 2px dashed #94a3b8; border-radius: 12px; background: #ffffff !important; touch-action: none; cursor: crosshair; display: block; }
        
        /* עיצוב לתצוגת מחשב/מסך (לפני הדפסה) */
        .official-print-wrapper {
            display: flex; flex-direction: column; width: 100%; max-width: 210mm;
            margin: 0 auto; background: white !important; padding: 10mm; box-sizing: border-box; 
            color: black !important; font-family: 'Assistant', sans-serif !important;
        }

        .official-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 5px double #000 !important; padding-bottom: 8px; margin-bottom: 10px; }
        .header-right { text-align: right; }
        .header-left { text-align: left; }
        .school-name { font-size: 24px; font-weight: 900; color: #000 !important; margin: 0; letter-spacing: -0.5px; line-height: 1.2; }
        .report-title { font-size: 20px; font-weight: 900; color: #000 !important; margin: 4px 0 0 0; }
        .meta-text { font-size: 14px; font-weight: 800; color: #000 !important; margin-top: 4px; }
        .table-container { width: 100%; flex-grow: 1; display: flex; flex-direction: column; }

        .official-table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; border: 3px solid #000 !important; background: white !important; }
        .official-table th { background-color: #cbd5e1 !important; color: #000 !important; font-weight: 900 !important; font-size: 15px !important; padding: 8px 4px !important; border: 2px solid #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .official-table td { border: 1px solid #000 !important; padding: 6px 4px !important; font-size: 15px !important; font-weight: 800 !important; color: #000 !important; word-wrap: break-word !important; white-space: normal !important; }
        .official-table tr:nth-child(even) td { background-color: #f1f5f9 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        .official-footer { display: flex; justify-content: space-between; align-items: flex-end; border-top: 3px solid #000 !important; padding-top: 15px; margin-top: 15px; }
        .summary-box { font-size: 18px; font-weight: 800; color: #000 !important; }
        .summary-box b { font-size: 22px; font-weight: 900; color: #000 !important; }
        .signature-box { width: 220px; text-align: center; color: #000 !important; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .signer-name { font-weight: 900; font-size: 18px; color: #000 !important; margin-bottom: 2px; }
        .signature-line { border-bottom: 2px dashed #000 !important; width: 100%; height: 60px; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 6px; }
        .signature-line img { max-height: 55px; max-width: 100%; object-fit: contain; }
        .signer-role { font-size: 14px; font-weight: 700; color: #000 !important; }

        /* ------------------------------------------------------------------------------------------------
           חוק מרפי: נעילת הדפסה לדף יחיד בלבד (Single Page PDF Lock)
           ------------------------------------------------------------------------------------------------ */
        @media print {
            @page { size: A4 portrait; margin: 5mm !important; }
            
            /* מונע כל אפשרות פיזית של הדפדפן להוסיף דף שני */
            body, html, #root { 
                height: 100vh !important; 
                max-height: 100vh !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                overflow: hidden !important; 
                display: block !important;
                box-sizing: border-box !important;
            }
            
            .no-print { display: none !important; }
            .no-print-bg { background: white !important; }
            
            /* תופס בדיוק 100% מהמסך הנותר להדפסה */
            .print-modal-fix { 
                position: absolute !important; 
                top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
                width: 100% !important; 
                height: 100vh !important; 
                background: white !important; 
                padding: 0 !important; 
                z-index: 999999 !important; 
                overflow: hidden !important;
            }
            
            .official-print-wrapper { 
                display: flex !important; 
                flex-direction: column !important; 
                width: 100% !important; 
                height: 100% !important; 
                max-height: 100vh !important;
                padding: 0 !important; 
                margin: 0 !important; 
                box-shadow: none !important; 
                page-break-inside: avoid !important;
            }
            
            .official-print-wrapper * { color: black !important; border-color: black !important; }
            
            .official-header { flex-shrink: 0 !important; margin-bottom: 5px !important; padding-bottom: 5px !important; }
            .official-footer { flex-shrink: 0 !important; margin-top: auto !important; padding-top: 5px !important; border-top: 2px solid #000 !important; }
            
            /* טבלה שמתכווצת ונמתחת כדי למלא בדיוק את הרווח האמצעי */
            .table-container { 
                flex-grow: 1 !important; 
                min-height: 0 !important; 
                display: flex !important;
                flex-direction: column !important;
                justify-content: stretch !important;
            }
            
            .official-table { 
                width: 100% !important; 
                height: 100% !important; 
            }
            
            /* גודל הטקסט מתאים את עצמו (Clamp) כדי לא לחרוג אף פעם מגבולות הדף */
            .official-table th { font-size: 11pt !important; padding: 2px !important; height: 1px !important; }
            .official-table td { 
                font-size: clamp(8pt, 1.8vh, 12pt) !important; 
                padding: 1px 2px !important; 
            }
            
            .school-name { font-size: 16pt !important; margin: 0 !important;}
            .report-title { font-size: 14pt !important; margin: 0 !important;}
            .meta-text { font-size: 10pt !important; margin: 0 !important;}
            
            .summary-box { font-size: 12pt !important; }
            .summary-box b { font-size: 14pt !important; }
            .signature-box { width: auto !important; margin-top: 5px !important; }
            .signer-name { font-size: 11pt !important; margin-bottom: 0 !important; }
            .signature-line { height: 35px !important; margin-bottom: 0 !important; border-width: 1px !important; }
            .signature-line img { max-height: 30px !important; }
            .signer-role { font-size: 10pt !important; }
        }

        .emergency-bg { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { background-color: #7f1d1d; } 50% { background-color: #b91c1c; } 100% { background-color: #7f1d1d; } }
        
        .toast-popup { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 15px 30px; border-radius: 50px; font-weight: 900; font-size: 1.2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 9999; animation: slideDown 0.5s ease-out; }
        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = { apiKey: "AIzaSyCbUcZeBHsZDy3AvYLYe8OZ4nGQ3v3_E-U", databaseURL: "https://misdar-acco-default-rtdb.europe-west1.firebasedatabase.app" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const MajorsList = ["מכונה", "חובל משמרת", "אלקטרוניקה", "לוגיסטיקת נמלים"];
        const ROLE_TYPES = { kadar: 'קד"ר', madrich: 'מדריך', ab_bayit: 'אב בית', kabat: 'קב"ט', firefighter: 'כבאי', medic: 'מע"ר', scanner: 'סורק', safety_comm: 'מפקד ביטחון בטיחות', officer: 'קצין תורן', kmz: 'ק.מ.ז', cadet_comm: 'מפקד קדטים', deputy_comm: 'סגן מפקד קדטים', village_mgr: 'מנהל הכפר' };
        
        const EMERGENCY_ROLES = ['kabat', 'safety_comm', 'scanner', 'medic', 'firefighter'];
        const VALID_CLASSES = ["א/1", "א/2", "א/3", "ב/1", "ב/2", "ב/3", "ב/4", "ג/1", "ג/2", "ג/3", "ג/4", "ד/1", "ד/2", "ד/3", "ד/4"];
        const extractClassFromName = (nameStr) => {
            if (!nameStr) return "";
            for (let c of VALID_CLASSES) {
                if (nameStr.includes(c)) return c;
            }
            return "";
        };

        const NOTES_PRESENCE = ["חולה בבית", "נעדר", "חופשה מיוחדת", "מושעה", "תיגבור", "תורנות", "אחר (מוצדק)"];
        const NOTES_MORNING = ["חולה בבית", "חופשה מיוחדת", "חדר חולים", "מסדר חולים", "פרגולה", "מסדר חוץ", "ק.מ", "ק.מ.ז", "דגלן", "הגברה", "תורנות", "שעת אפס"];
        const MORNING_COUNTS_AS_PRESENT = ["הגברה", "דגלן", "ק.מ", "מסדר חוץ", "ק.מ.ז"];
        const ROOM_CHECKS = ["סדר כללי", "מיטות", "שולחנות", "מראה", "אורות", "שטיפה", "פח", "מקלחת", "כיור", "שירותים", "מטען", "מזגן"];

        const generateRandomCode = () => Math.floor(100000 + Math.random() * 900000).toString();
        const AnchorIcon = ({ size = 24, color = "currentColor" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5V21M5 12H2M22 12h-3M12 5c-3.31 0-6 2.69-6 6 0 3.1 2.31 5.67 5.33 5.97M12 5c3.31 0 6 2.69 6 6 0 3.1-2.31 5.67-5.33 5.97M7 21h10"/><circle cx="12" cy="5" r="2"/></svg>
        );

        const generateQR = (text) => { 
            try { 
                if(text.length > 2900) {
                    alert("אזהרה: רשימת החניכים ארוכה מדי מכדי להידחס לברקוד בודד. הברקוד עלול שלא להיסרק. הדו\"ח בענן תקין.");
                }
                const qr = new QRious({ value: text, size: 512, level: 'M' });
                return qr.toDataURL(); 
            } catch (e) { return ""; } 
        };

        const compressReportForQR = (payload) => {
            return JSON.stringify({
                _t: payload.type,
                _a: payload.author,
                _s: payload.signerName || "",
                _ur: payload.userRole || "",
                _ts: payload.timestamp,
                _r: payload.rows ? payload.rows.map(r => [r.name || r.id, r.class || "", r.isPresent ? 1 : 0, r.note || ""]) : []
            });
        };

        const decompressReportFromQR = (dataStr) => {
            const parsed = JSON.parse(dataStr);
            if (!parsed._t) throw new Error("Invalid Format");
            return {
                reportId: `offline_report_${parsed._ts}`,
                type: parsed._t,
                author: parsed._a,
                signerName: parsed._s,
                userRole: parsed._ur || parsed._a,
                timestamp: parsed._ts,
                totalStudents: parsed._r ? parsed._r.length : 0,
                totalPresent: parsed._r ? parsed._r.filter(r => r[2] === 1).length : 0,
                signature: null, 
                rows: parsed._r ? parsed._r.map(r => ({
                    id: Math.random().toString(),
                    name: r[0],
                    class: r[1],
                    isPresent: r[2] === 1,
                    note: r[3]
                })) : []
            };
        };

        const EmergencyComms = ({ userRole }) => {
            const [msg, setMsg] = useState("");
            const [comms, setComms] = useState([]);

            useEffect(() => {
                const ref = database.ref('system/comms').limitToLast(15);
                ref.on('value', snap => {
                    const data = snap.val();
                    if(data) setComms(Object.values(data).reverse());
                    else setComms([]);
                });
                return () => ref.off();
            }, []);

            const sendMsg = () => {
                if(!msg.trim()) return;
                database.ref('system/comms').push({
                    text: msg,
                    author: userRole,
                    time: new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})
                });
                setMsg("");
            };

            return (
                <div className="modern-card p-4 border-t-4 border-red-500 bg-slate-800">
                    <h3 className="font-black text-white text-sm mb-3 flex items-center gap-2">
                        <span className="text-red-500">🔴</span> רשת קשר כוחות חירום
                    </h3>
                    <div className="flex gap-2 mb-3">
                        <input 
                            value={msg} 
                            onChange={e=>setMsg(e.target.value)} 
                            onKeyPress={e => e.key === 'Enter' && sendMsg()}
                            placeholder="הודעה לכלל הכוחות..." 
                            className="flex-1 p-3 border border-slate-600 rounded-xl bg-slate-700 text-white font-bold outline-none focus:border-red-500 text-sm" 
                        />
                        <button onClick={sendMsg} className="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-xl font-bold shadow transition">שלח</button>
                    </div>
                    <div className="space-y-2 max-h-40 overflow-y-auto pr-1">
                        {comms.length === 0 && <div className="text-slate-500 text-xs text-center font-bold">רשת הקשר שקטה.</div>}
                        {comms.map((c, i) => (
                            <div key={i} className="bg-slate-700/50 p-2 rounded-lg text-sm border border-slate-600/50">
                                <span className="text-slate-400 text-xs font-mono">[{c.time}]</span>{' '}
                                <span className="font-bold text-amber-400">{c.author}:</span>{' '}
                                <span className="text-slate-200 font-bold">{c.text}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ReportViewerModal = ({ report, onClose }) => {
            if (!report) return null;
            const dateStr = new Date(report.timestamp).toLocaleDateString('he-IL');
            const timeStr = new Date(report.timestamp).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
            
            return (
                <div className="fixed inset-0 bg-black/95 z-[9999] overflow-y-auto p-4 md:p-8 no-print-bg print-modal-fix">
                    <div className="no-print mb-6 text-center max-w-3xl mx-auto flex justify-center gap-3 mt-4 bg-slate-800 p-4 rounded-2xl shadow-lg border border-slate-600">
                        <button onClick={() => window.print()} className="flex-1 bg-emerald-500 hover:bg-emerald-400 text-slate-900 px-6 py-4 rounded-xl font-black text-lg shadow-lg transition">🖨️ שמור כ-PDF / הדפס</button>
                        <button onClick={onClose} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white px-6 py-4 rounded-xl font-bold transition">סגור תצוגה</button>
                    </div>
                    
                    <div className="official-print-wrapper shadow-2xl print:shadow-none">
                        <div className="official-header">
                            <div className="header-right"><h1 className="school-name">ביה"ס לקציני ים עכו</h1><h2 className="report-title">{report.type}</h2></div>
                            <div className="header-left">
                                <div className="meta-text">תאריך: <span dir="ltr">{dateStr}</span></div>
                                <div className="meta-text">שעה: <span dir="ltr">{timeStr}</span></div>
                            </div>
                        </div>
                        <div className="mb-2 text-black font-bold text-lg">
                            מחלקה / כיתה: {report.author}
                        </div>
                        
                        {/* עטיפת הטבלה בקונטיינר כדי להפעיל את גמישות העמוד (Flex) */}
                        <div className="table-container">
                            <table className="official-table">
                                <thead>
                                    <tr>
                                        <th style={{width:'40%'}}>שם החניך</th>
                                        <th style={{width:'20%'}}>כיתה</th>
                                        {report.type === 'kmz' ? <th style={{width:'20%'}}>כניסה</th> : <th style={{width:'15%'}}>נוכחות</th>}
                                        {report.type === 'kmz' ? <th style={{width:'20%'}}>יציאה</th> : <th style={{width:'25%'}}>הערות</th>}
                                    </tr>
                                </thead>
                                <tbody>
                                    {report.rows && report.rows.map((r, i) => (
                                        <tr key={i} style={{ backgroundColor: r.isPresent === false ? '#fee2e2' : 'inherit' }}>
                                            <td style={{fontWeight:'900'}}>{r.name}</td>
                                            <td>{r.class}</td>
                                            {report.type === 'kmz' ? (
                                                <>
                                                    <td style={{fontWeight:'900'}}>{r.timeIn || '-'}</td>
                                                    <td style={{fontWeight:'900'}}>{r.timeOut || '-'}</td>
                                                </>
                                            ) : (
                                                <>
                                                    <td style={{fontWeight:'900', color: r.isPresent ? '#059669' : '#dc2626'}}>{r.isPresent ? 'נוכח' : 'חסר'}</td>
                                                    <td>{r.note || '-'}</td>
                                                </>
                                            )}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                        
                        <div className="official-footer">
                            {report.type !== 'kmz' ? (
                                <div className="summary-box">סה"כ נוכחים / תקינים: <b>{report.totalPresent !== undefined ? report.totalPresent : (report.rows && report.rows.filter(r=>r.isPresent).length) || 0}</b> מתוך <b>{report.totalStudents || (report.rows && report.rows.length) || 0}</b></div>
                            ) : (
                                <div className="summary-box">סה"כ נבדקו במרפאה: <b>{report.rows && report.rows.length}</b></div>
                            )}
                            <div className="signature-box">
                                <div className="signer-name">{report.signerName || "לא הוזן שם"}</div>
                                <div className="signature-line">
                                    {report.signature ? <img src={report.signature} alt="חתימה" /> : <div style={{height: '50px'}}></div>}
                                </div>
                                <div className="signer-role">{report.userRole || report.author}</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const QRScanner = ({ onResult, onClose }) => {
            useEffect(() => {
                let scanner;
                try {
                    scanner = new Html5QrcodeScanner("reader", { 
                        fps: 15, 
                        qrbox: { width: 250, height: 250 },
                        aspectRatio: 1.0,
                        formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ] 
                    }, false);
                    scanner.render(
                        (text) => { 
                            if(scanner) scanner.clear(); 
                            onResult(text); 
                        }, 
                        (err) => { /* ignore */ }
                    );
                } catch(e) {}
                
                return () => {
                    if (scanner) {
                        try { scanner.clear(); } catch(e) {}
                    }
                };
            }, []);
            return (
                <div className="fixed inset-0 bg-black/95 z-[9999] flex flex-col items-center justify-center p-4">

                                </div>
                            )

                    </div>
                </div>
            );
        };

        const GodModeView = ({ setGodRole, handleLogout }) => {
            return (
                <div className="min-h-screen p-6 bg-slate-900 no-print">
                    <header className="flex justify-between items-center mb-8 border-b-4 border-amber-400 pb-4 bg-slate-800 p-6 rounded-3xl shadow-xl mt-4">
                        <h2 className="text-3xl font-black text-amber-400">⚡ GOD MODE ⚡</h2>

                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4">

                                    key={val}

                                    {label}
                                </button>

                            <button 
                                onClick={() => setGodRole('admin', 'אדמין מערכת')} 
                                className="bg-amber-600 hover:bg-amber-500 border border-amber-400 text-slate-900 p-4 rounded-xl font-black shadow-lg transition"
                            >
                                ⚙️ ניהול אדמין
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const MadrichView = ({ userRole, userCode, accessCodes, students, cloudReports, setView, handleLogout }) => {
            const [selectedReport, setSelectedReport] = useState(null);
            const assignedClass = accessCodes[userCode]?.assignedClass || "";

            const allClassesList = useMemo(() => [...new Set(students.map(s => s.className?.trim()).filter(Boolean))].sort(), [students]);
            
            const handleClassChange = (e) => {
                const newClass = e.target.value;
                database.ref(`access_codes/${userCode}`).update({ assignedClass: newClass });
            };

            const classStudents = useMemo(() => students.filter(s => s.className === assignedClass), [students, assignedClass]);
            
            const madrichReports = useMemo(() => {
                if (!assignedClass) return [];
                return cloudReports.filter(r => {
                    if (r.author === assignedClass) return true;
                    if (r.rows && r.rows.some(row => row.class === assignedClass)) return true;
                    return false;
                }).slice(0, 10); 
            }, [cloudReports, assignedClass]);

            const stats = useMemo(() => {
                let ok = 0, waiting = 0, sick = 0;
                classStudents.forEach(s => {
                    if(s.status === 'נוכח' || s.isDone) ok++;
                    else if(s.status === 'ממתין') waiting++;
                    else sick++;
                });
                return { ok, waiting, sick, total: classStudents.length };
            }, [classStudents]);

            return (
                <div className="min-h-screen pb-20 no-print">
                    <header className="mb-6 bg-slate-800 text-white p-6 rounded-b-3xl shadow-xl flex justify-between items-center border-b border-slate-700">
                        <div>
                            <h1 className="text-2xl font-black text-amber-400">דשבורד מדריך</h1>
                            <h2 className="text-sm font-bold text-slate-400">{userRole}</h2>
                        </div>
                        <button onClick={handleLogout} className="text-sm bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-lg font-bold transition">התנתק</button>
                    </header>
                    
                    <div className="p-4 max-w-xl mx-auto space-y-6">
                        <div className="modern-card p-6 border-t-4 border-amber-400">
                            <h3 className="font-bold text-white mb-2 text-sm">בחירת כיתת אם עליה אתה מפקד:</h3>
                            <select className="w-full p-4 rounded-xl border border-slate-600 bg-slate-700 text-white font-bold outline-none focus:border-amber-400" value={assignedClass} onChange={handleClassChange}>
                                <option value="">-- בחר כיתה להצגת נתונים --</option>
                                {allClassesList.map(c => <option key={c} value={c}>כיתה {c}</option>)}
                            </select>
                            {!assignedClass && <p className="text-amber-400 text-xs font-bold mt-2">יש לבחור כיתה כדי לראות את הדשבורד ולקבל התרעות.</p>}
                        </div>

                        {assignedClass && (
                            <>
                                <div className="grid grid-cols-3 gap-3 text-center">
                                    <div className="bg-slate-800 border border-slate-700 p-4 rounded-2xl shadow">
                                        <div className="text-2xl font-black text-white">{stats.total}</div>
                                        <div className="text-xs font-bold text-slate-400">סה"כ חניכים</div>
                                    </div>
                                    <div className="bg-emerald-900/50 border border-emerald-700 p-4 rounded-2xl shadow">
                                        <div className="text-2xl font-black text-emerald-400">{stats.ok}</div>
                                        <div className="text-xs font-bold text-emerald-200">נוכחים / שוחררו</div>
                                    </div>
                                    <div className="bg-amber-900/50 border border-amber-700 p-4 rounded-2xl shadow">
                                        <div className="text-2xl font-black text-amber-400">{stats.sick}</div>
                                        <div className="text-xs font-bold text-amber-200">חסרים / חולים</div>
                                    </div>
                                </div>

                                <div className="modern-card p-6 border-t-4 border-blue-500">
                                    <h3 className="font-bold text-white text-lg mb-4">פעולות מהירות לכיתה {assignedClass}</h3>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => setView("kadar_form_boker")} className="bg-slate-700 hover:bg-slate-600 text-white p-3 rounded-xl font-bold text-sm border border-slate-600 transition">☀️ מסדר בוקר</button>
                                        <button onClick={() => setView("kadar_form_knisa")} className="bg-slate-700 hover:bg-slate-600 text-white p-3 rounded-xl font-bold text-sm border border-slate-600 transition">🚶‍♂️ מסדר כניסה</button>
                                        <button onClick={() => setView("kadar_form_nochachut")} className="bg-slate-700 hover:bg-slate-600 text-white p-3 rounded-xl font-bold text-sm border border-slate-600 transition">📝 דו"ח נוכחות</button>
                                        <button onClick={() => setView("kadar_form_kibui_orot")} className="bg-slate-700 hover:bg-slate-600 text-white p-3 rounded-xl font-bold text-sm border border-slate-600 transition">🌙 כיבוי אורות</button>
                                    </div>
                                    <button onClick={() => setView("kadar_exit_original")} className="w-full mt-3 bg-slate-800 hover:bg-slate-900 text-amber-400 p-3 rounded-xl font-black text-sm border border-amber-500/50 transition shadow-lg">🚪 מסדר יציאה לכיתה</button>
                                </div>

                                <div className="modern-card p-6 border-t-4 border-purple-500">

                                        {madrichReports.length === 0 && <div className="text-slate-400 text-sm">טרם התקבלו דו"חות עבור כיתה זו.</div>}
                                        {madrichReports.map(r => (
                                            <div key={r.reportId} className="bg-slate-700 p-3 rounded-lg flex justify-between items-center border border-slate-600">
                                                <div>
                                                    <div className="font-bold text-white text-sm">
                                                        {r.type === 'kmz' ? 'ביקור במרפאה' : r.type} 
                                                        <span className="text-slate-400 text-xs ml-2">({r.author})</span>
                                                    </div>
                                                    <div className="text-xs text-amber-400 mt-1">{new Date(r.timestamp).toLocaleTimeString('he-IL')} | {new Date(r.timestamp).toLocaleDateString('he-IL')}</div>
                                                </div>
                                                <button onClick={() => setSelectedReport(r)} className="bg-slate-800 hover:bg-slate-900 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition border border-slate-500">צפה</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="modern-card p-6 border-t-4 border-emerald-500">
                                    <h3 className="font-bold text-white text-lg mb-3">מצב חניכי הכיתה חי</h3>
                                    <div className="space-y-2 max-h-60 overflow-y-auto pr-2">
                                        {classStudents.length === 0 ? <div className="text-slate-400 text-sm">אין חניכים רשומים לכיתה זו.</div> : null}
                                        {classStudents.map(s => (
                                            <div key={s.id} className="bg-slate-700 p-2 rounded flex justify-between items-center text-sm border border-slate-600">
                                                <div className="font-bold text-white">{s.firstName} {s.lastName}</div>
                                                <div className={`font-bold px-2 py-1 rounded text-xs ${s.status === 'נוכח' ? 'bg-emerald-900 text-emerald-300' : 'bg-slate-800 text-slate-300'}`}>{s.status}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </>
                        )}
                    </div>
                    {selectedReport && <ReportViewerModal report={selectedReport} onClose={() => setSelectedReport(null)} />}
                </div>
            );
        };

        const KadarForm = ({ userRole, userCode, accessCodes, userType, students, formType, setView }) => {
            const isMorning = ['boker', 'knisa'].includes(formType); 
            const isEmergencyForm = formType === 'emergency'; 
            const isPDFNeeded = ['nochachut', 'kibui_orot', 'boker', 'knisa'].includes(formType);
            
            let title = 'דו"ח דיווח';
            if (formType === 'boker') title = 'מסדר בוקר';
            if (formType === 'knisa') title = 'מסדר כניסה';
            if (formType === 'nochachut') title = 'דו"ח נוכחות';
            if (formType === 'kibui_orot') title = 'כיבוי אורות';
            if (isEmergencyForm) title = 'דו"ח חירום';

            const assignedClass = accessCodes[userCode]?.assignedClass || "";
            const extractedClass = userType === 'madrich' ? assignedClass : extractClassFromName(userRole);
            
            const exactMatchStudents = students.filter(s => {
                const sClass = (s.className || '').trim();
                return sClass === userRole.trim() || (extractedClass && sClass === extractedClass);
            }).sort((a,b) => (a.lastName||'').localeCompare(b.lastName||''));
            
            const [selectedClass, setSelectedClass] = useState("");
            const classStudents = exactMatchStudents.length > 0 ? exactMatchStudents : students.filter(s => (s.className || '').trim() === selectedClass).sort((a,b) => (a.lastName||'').localeCompare(b.lastName||''));
            
            const [formState, setFormState] = useState({}); 
            const [submittedReport, setSubmittedReport] = useState(null); 
            const [showReportQR, setShowReportQR] = useState(false); 
            const [qrPayload, setQrPayload] = useState(""); 
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showPDFModal, setShowPDFModal] = useState(false);
            const [signerName, setSignerName] = useState("");

            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            const startDrawing = (e) => {
                if(!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
                const rect = canvasRef.current.getBoundingClientRect(); const offsetX = (e.touches && e.touches[0]) ? e.touches[0].clientX - rect.left : e.nativeEvent.offsetX; const offsetY = (e.touches && e.touches[0]) ? e.touches[0].clientY - rect.top : e.nativeEvent.offsetY;
                ctx.moveTo(offsetX, offsetY); setIsDrawing(true);
            };
            const draw = (e) => {
                if (!isDrawing || !canvasRef.current) return;
                const rect = canvasRef.current.getBoundingClientRect(); const offsetX = (e.touches && e.touches[0]) ? e.touches[0].clientX - rect.left : e.nativeEvent.offsetX; const offsetY = (e.touches && e.touches[0]) ? e.touches[0].clientY - rect.top : e.nativeEvent.offsetY;
                canvasRef.current.getContext('2d').lineTo(offsetX, offsetY); canvasRef.current.getContext('2d').stroke();
            };
            const stopDrawing = () => setIsDrawing(false);
            const clearSignature = () => { if(canvasRef.current) canvasRef.current.getContext('2d').clearRect(0, 0, 320, 150); };

            const handleToggle = (id) => { const current = formState[id] || { status: false, note: '', customNote: '' }; setFormState({ ...formState, [id]: { ...current, status: !current.status } }); };
            const handleNote = (id, note) => { const current = formState[id] || { status: false, note: '', customNote: '' }; setFormState({ ...formState, [id]: { ...current, note } }); };

            const finishForm = async () => {
                if (classStudents.length === 0) return alert("אין חניכים להגשה.");
                if (!signerName.trim()) return alert("חובה להזין את שם ממלא הדו\"ח לפני ההגשה.");
                
                setIsSubmitting(true); let totalPresent = 0;
                const finalRows = classStudents.map(s => {
                    const rec = formState[s.id] || { status: false, note: '', customNote: '' };
                    let isCountedPresent = rec.status; if (isMorning && !isCountedPresent && MORNING_COUNTS_AS_PRESENT.includes(rec.note)) isCountedPresent = true;
                    if (isCountedPresent) totalPresent++;
                    return { id: s.id, name: `${s.lastName} ${s.firstName}`, class: s.className, isPresent: isCountedPresent, note: rec.note === 'אחר (ידני)' ? rec.customNote : rec.note };
                });
                
                const finalAuthor = exactMatchStudents.length > 0 ? (extractedClass || userRole) : selectedClass;
                const safeAuthor = finalAuthor.replace(/[\/\.#$\[\]]/g, '-');
                const generatedReportId = `rep_${safeAuthor}_${title}`;

                const signatureBase64 = canvasRef.current ? canvasRef.current.toDataURL("image/png") : null;

                const payload = { 
                    reportId: generatedReportId, 
                    author: finalAuthor,
                    signerName: signerName, 
                    userRole: userRole, 
                    type: title, 
                    timestamp: new Date().getTime(), 
                    totalStudents: classStudents.length, 
                    totalPresent: totalPresent, 
                    rows: finalRows,
                    signature: signatureBase64
                };
                
                try { await database.ref(`reports_cloud/${payload.reportId}`).set(payload); } catch (e) {}
                
                setSubmittedReport(payload);
                setQrPayload(compressReportForQR(payload)); 
                setShowReportQR(true); 
                setIsSubmitting(false);
            };

            const allClassesList = [...new Set(students.map(s => s.className?.trim()).filter(Boolean))].sort();

            return (
                <div className={`min-h-screen pb-24 ${isEmergencyForm ? 'bg-red-950' : 'bg-[#0f172a]'} no-print`}>
                    <header className={`${isEmergencyForm ? 'bg-red-900 border-red-500' : 'bg-slate-800 border-amber-400'} border-b-4 text-white p-6 sticky top-0 z-40 rounded-b-3xl shadow-lg`}>
                        <div className="flex justify-between items-center"><div><h1 className="text-2xl font-black text-amber-400">{title}</h1><h2 className="text-sm font-bold text-slate-300">מדווח: {userRole}</h2></div><button onClick={() => setView(userType === 'madrich' ? "madrich_dash" : "kadar_menu")} className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl font-bold text-sm shadow transition">חזור</button></div>
                    </header>
                    <main className="p-4 space-y-4 mt-2 max-w-md mx-auto">
                        {exactMatchStudents.length === 0 && (
                            <div className="modern-card p-6 border-2 border-amber-500 mb-6 bg-slate-800 text-center">
                                <h3 className="font-bold text-amber-400 mb-2">לא זוהתה כיתה אוטומטית</h3>
                                <p className="text-slate-300 text-sm mb-4">המערכת לא הצליחה לחלץ כיתה מהשם שלך ({userRole}). אנא בחר כיתה רלוונטית:</p>
                                <select className="w-full p-4 bg-slate-700 border border-slate-600 rounded-xl text-white font-bold outline-none" value={selectedClass} onChange={(e) => setSelectedClass(e.target.value)}>
                                    <option value="">-- בחר כיתה --</option>
                                    {allClassesList.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                        )}
                        {exactMatchStudents.length === 0 && selectedClass !== "" && classStudents.length === 0 && <div className="text-center font-bold text-slate-400 mt-10 p-6 bg-slate-800 rounded-2xl shadow border border-slate-700">אין חניכים רשומים לכיתה זו.</div>}
                        
                        {classStudents.map(s => {
                            const rec = formState[s.id] || { status: false, note: '', customNote: '' }; const notesOptions = isMorning ? NOTES_MORNING : NOTES_PRESENCE;
                            let isAutoPresent = isMorning && MORNING_COUNTS_AS_PRESENT.includes(rec.note); const boxColor = (rec.status || isAutoPresent) ? 'border-emerald-500' : 'border-slate-700';
                            return (
                                <div key={s.id} className={`bg-slate-800 p-5 rounded-2xl shadow-sm border-r-4 ${boxColor} flex flex-col gap-3 transition-colors`}>
                                    <div className="flex justify-between items-center">
                                        <span className="font-bold text-lg text-white">{s.lastName} {s.firstName}</span>
                                        <button onClick={() => handleToggle(s.id)} className={`w-12 h-12 rounded-xl border-2 flex items-center justify-center font-black text-2xl transition-all shadow-sm ${rec.status ? 'bg-emerald-600 border-emerald-500 text-white' : 'bg-slate-700 border-slate-600 text-slate-500'}`}>{rec.status ? '✓' : ''}</button>
                                    </div>
                                    <select value={rec.note} onChange={(e) => handleNote(s.id, e.target.value)} className="w-full p-3 bg-slate-700 border border-slate-600 rounded-xl text-sm font-bold text-white outline-none focus:border-amber-400"><option value="">-- בחר הערה (לא חובה) --</option>{notesOptions.map(opt => <option key={opt} value={opt}>{opt}</option>)}{isMorning && <option value="אחר (ידני)">הערה ידנית...</option>}</select>
                                    {rec.note === 'אחר (ידני)' && <input type="text" placeholder="הקלד הערה ידנית..." value={rec.customNote} onChange={e => setFormState({...formState, [s.id]: {...rec, customNote: e.target.value}})} className="w-full p-3 border border-slate-600 rounded-xl bg-slate-700 text-white font-bold outline-none focus:border-amber-400 text-sm" />}
                                </div>
                            );
                        })}

                        {classStudents.length > 0 && (
                            <div className="modern-card p-6 mt-6 border-t-4 border-amber-400">
                                <label className="text-sm font-bold text-slate-300 mb-2 block">שם ממלא הדו"ח (חובה):</label>
                                <input className="w-full p-4 bg-slate-700 border border-slate-600 text-white rounded-xl font-bold mb-4 outline-none focus:border-amber-400" placeholder="לדוגמה: ישראל ישראלי..." value={signerName} onChange={e => setSignerName(e.target.value)} />
                                
                                <label className="text-sm font-bold text-slate-300 mb-2 block">חתימה (צייר כאן):</label>
                                <canvas ref={canvasRef} width={320} height={150} className="signature-canvas w-full mb-2 mx-auto" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                                <button onClick={clearSignature} className="text-sm text-red-400 hover:text-red-300 font-bold underline text-center block w-full">נקה חתימה</button>
                            </div>
                        )}
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-slate-800 border-t border-slate-700"><button disabled={isSubmitting || classStudents.length === 0} onClick={finishForm} className="w-full btn-gold py-4 rounded-xl font-black text-xl shadow-lg disabled:opacity-50">הפק ושלח דו"ח</button></div>
                    
                    {showReportQR && (
                        <div className="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
                            <h2 className="text-3xl font-black text-amber-400 mb-2">הדו"ח הוגש בהצלחה!</h2>
                            <p className="text-slate-300 text-lg font-bold mb-4">
                                {isEmergencyForm ? 'הדו"ח הועבר מיידית לקב"ט.' : 'הדו"ח סונכרן בענן והועבר לגורמים הרלוונטים.'}
                            </p>
                            
                            {isPDFNeeded && (
                                <div className="mb-8 w-full max-w-xs">
                                    <button onClick={() => setShowPDFModal(true)} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-black text-lg shadow-lg transition">📄 הצג והורד כ-PDF</button>
                                </div>
                            )}

                            <div className="bg-red-900/40 border border-red-500 text-red-200 p-3 rounded-xl mb-4 text-xs font-bold max-w-sm">
                                ⚠️ גיבוי אופליין: הברקוד מיועד לסריקה ע"י המערכת בלבד במקרה שאין אינטרנט בשטח. אין לסרוק במצלמה רגילה.
                            </div>
                            
                            <div className="bg-white p-4 rounded-3xl shadow-2xl mb-8 border-4 border-amber-400">
                                <img src={generateQR(qrPayload)} alt="QR Code" className="mx-auto" />
                            </div>
                            
                            <button onClick={() => { setShowReportQR(false); setView(userType === 'madrich' ? "madrich_dash" : "kadar_menu"); }} className="w-full max-w-xs bg-slate-700 hover:bg-slate-600 py-4 rounded-xl font-black text-white text-xl shadow-lg transition">חזור לתפריט הראשי</button>
                        </div>
                    )}

                    {showPDFModal && submittedReport && (
                        <ReportViewerModal report={submittedReport} onClose={() => setShowPDFModal(false)} />
                    )}
                </div>
            );
        };

        const KadarMenu = ({ userRole, userType, isEmergency, setView, handleLogout }) => {
            if (isEmergency && userType === 'kadar') {
                return (
                    <div className="min-h-screen bg-red-950 p-6 flex flex-col items-center justify-center">
                        <div className="bg-red-900 text-white p-8 rounded-3xl shadow-2xl text-center border-2 border-red-500 w-full max-w-sm"><h1 className="text-4xl font-black mb-4 animate-pulse">🚨 חירום 🚨</h1><p className="font-bold text-lg mb-8 text-red-100">הופעל נוהל חירום בכפר! עליך למלא דו"ח נוכחות מיידי לכיתה שלך שישלח אוטומטית לקב"ט.</p><button onClick={() => setView("kadar_form_emergency")} className="w-full bg-white text-red-700 py-5 rounded-2xl font-black text-2xl shadow-lg hover:bg-red-50 transition">מילוי דו"ח חירום</button></div>
                    </div>
                );
            }
            return (
                <div className="min-h-screen p-6 no-print">
                    <header className="flex justify-between items-center mb-10 bg-slate-800 p-6 rounded-3xl shadow-lg border-b-4 border-amber-400"><div><h2 className="text-xl font-black text-white">{userRole}</h2><h3 className="text-slate-400 font-bold text-sm mt-1">בחירת פעולה</h3></div><button onClick={handleLogout} className="text-slate-300 bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl font-bold transition">התנתק</button></header>
                    <div className="grid gap-4 max-w-md mx-auto">
                        <button onClick={() => setView("kadar_form_boker")} className="modern-card p-5 text-right hover:border-amber-400 transition-colors border-r-4 border-blue-500"><h3 className="text-lg font-bold text-white mb-1">☀️ מסדר בוקר</h3><p className="text-xs text-slate-400">נשלח לקצין תורן ויצירת PDF</p></button>
                        <button onClick={() => setView("kadar_form_knisa")} className="modern-card p-5 text-right hover:border-amber-400 transition-colors border-r-4 border-emerald-500"><h3 className="text-lg font-bold text-white mb-1">🚶‍♂️ מסדר כניסה</h3><p className="text-xs text-slate-400">נשלח לקצין תורן ויצירת PDF</p></button>
                        <button onClick={() => setView("kadar_form_nochachut")} className="modern-card p-5 text-right hover:border-amber-400 transition-colors border-r-4 border-purple-500"><h3 className="text-lg font-bold text-white mb-1">📝 דו"ח נוכחות</h3><p className="text-xs text-slate-400">מייצר קובץ PDF לשיתוף</p></button>
                        <button onClick={() => setView("kadar_form_kibui_orot")} className="modern-card p-5 text-right hover:border-amber-400 transition-colors border-r-4 border-indigo-500"><h3 className="text-lg font-bold text-white mb-1">🌙 כיבוי אורות</h3><p className="text-xs text-slate-400">מייצר קובץ PDF לשיתוף</p></button>
                        <button onClick={() => setView("kadar_exit_original")} className="btn-navy p-5 rounded-2xl shadow-xl text-right mt-2 border-b-4 border-amber-400 hover:brightness-110 transition"><h3 className="text-lg font-black text-amber-400 mb-1">🚪 מסדר יציאה הביתה</h3><p className="text-xs text-slate-300">גישה למחלקה ושחרור עם ברקוד</p></button>
                    </div>
                </div>
            );
        };

        const OriginalExitApp = ({ globalStudents, userRole, goBack }) => {
            const [formData, setFormData] = useState({ firstName: '', lastName: '', className: '', major: 'מכונה' });
            const [editingStudent, setEditingStudent] = useState(null);
            const [activeFilter, setActiveFilter] = useState({ type: 'All', value: 'All' });
            const [showSignatureModal, setShowSignatureModal] = useState(false);
            const [isPrintMode, setIsPrintMode] = useState(false);
            const [signerName, setSignerName] = useState("");
            const [finalSignatureImg, setFinalSignatureImg] = useState(null);
            
            const [showQR, setShowQR] = useState(false); 
            const [qrPayload, setQrPayload] = useState("");
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            const filteredStudents = useMemo(() => {
                let list = [...globalStudents];
                if (activeFilter.type === 'Major') list = list.filter(s => s.major === activeFilter.value);
                if (activeFilter.type === 'Class') list = list.filter(s => s.className === activeFilter.value);
                return list.sort((a, b) => (a.className || "").localeCompare(b.className || "") || (a.lastName || "").localeCompare(b.lastName || ""));
            }, [globalStudents, activeFilter]);

            const classesList = useMemo(() => [...new Set(globalStudents.map(s => s.className).filter(Boolean))].sort(), [globalStudents]);
            const releasedOnly = useMemo(() => filteredStudents.filter(s => s.isDone), [filteredStudents]);
            
            const pdfTitle = useMemo(() => {
                if (activeFilter.type === 'Major') return `דוח מסדר - ${activeFilter.value}`;
                if (activeFilter.type === 'Class') return `דוח מסדר - כיתה ${activeFilter.value}`;
                return "דו\"ח סיכום מסדר יציאה";
            }, [activeFilter]);

            const startDrawing = (e) => {
                if(!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
                const rect = canvasRef.current.getBoundingClientRect(); const offsetX = (e.touches && e.touches[0]) ? e.touches[0].clientX - rect.left : e.nativeEvent.offsetX; const offsetY = (e.touches && e.touches[0]) ? e.touches[0].clientY - rect.top : e.nativeEvent.offsetY;
                ctx.moveTo(offsetX, offsetY); setIsDrawing(true);
            };
            const draw = (e) => {
                if (!isDrawing || !canvasRef.current) return;
                const rect = canvasRef.current.getBoundingClientRect(); const offsetX = (e.touches && e.touches[0]) ? e.touches[0].clientX - rect.left : e.nativeEvent.offsetX; const offsetY = (e.touches && e.touches[0]) ? e.touches[0].clientY - rect.top : e.nativeEvent.offsetY;
                canvasRef.current.getContext('2d').lineTo(offsetX, offsetY); canvasRef.current.getContext('2d').stroke();
            };
            const stopDrawing = () => setIsDrawing(false);
            const clearSignature = () => { if(canvasRef.current) canvasRef.current.getContext('2d').clearRect(0, 0, 320, 150); };

            const handleProceedToPrint = () => {
                if (!signerName.trim()) return alert("חובה להזין שם מלא לחתימה.");
                if (releasedOnly.length === 0 && !confirm("אין חניכים משוחררים ברשימה. להפיק מסמך ריק?")) return;
                if(canvasRef.current) setFinalSignatureImg(canvasRef.current.toDataURL("image/png"));
                setShowSignatureModal(false); setIsPrintMode(true); 
                setTimeout(() => { window.print(); }, 400);
            };
            
            const handleGenerateOfflineQR = () => {
                if (!signerName.trim()) return alert("חובה להזין שם מלא לפני שמירת ברקוד.");
                
                const reportId = `rep_exit_${new Date().getTime()}`;
                const payload = {
                    reportId: reportId,
                    author: userRole,
                    signerName: signerName,
                    userRole: userRole,
                    type: pdfTitle,
                    timestamp: new Date().getTime(),
                    rows: releasedOnly.map(s => ({name: `${s.lastName} ${s.firstName}`, class: s.className, isPresent: true, note: 'אושר שחרור'})),
                    totalStudents: releasedOnly.length,
                    totalPresent: releasedOnly.length,
                    signature: canvasRef.current ? canvasRef.current.toDataURL("image/png") : null
                };

                setQrPayload(compressReportForQR(payload));
                setShowSignatureModal(false);
                setShowQR(true);
            }

            const resetList = () => { if(confirm("לאפס את המסדר? (להחזיר את כולם לסטטוס ממתין)")) globalStudents.forEach(s => database.ref(`students/${s.id}`).update({ isDone: false, status: 'ממתין' })); };

            if (isPrintMode) {
                return (
                    <div className="bg-slate-900 print:bg-white print:text-black min-h-screen print:min-h-0 p-4 md:p-8 print:p-0 print-modal-fix" dir="rtl">
                        <div className="no-print mb-8 text-center p-6 rounded-2xl max-w-2xl mx-auto border-t-4 border-amber-400 bg-slate-800 shadow-2xl">
                            <h2 className="text-3xl font-black text-white mb-3">מסמך רשמי מוכן להדפסה</h2>
                            <div className="flex justify-center gap-4">
                                <button onClick={() => window.print()} className="bg-emerald-500 hover:bg-emerald-400 text-slate-900 px-8 py-4 rounded-xl font-black text-lg shadow-lg transition">🖨️ הדפס / שמור כ-PDF</button>
                                <button onClick={() => setIsPrintMode(false)} className="bg-slate-700 hover:bg-slate-600 text-white px-8 py-4 rounded-xl font-bold transition">🔙 חזור לעריכה</button>
                            </div>
                        </div>
                        
                        <div className="official-print-wrapper shadow-2xl print:shadow-none">
                            <div className="official-header">
                                <div className="header-right"><h1 className="school-name">ביה"ס לקציני ים עכו</h1><h2 className="report-title">{pdfTitle}</h2></div>
                                <div className="header-left"><div className="meta-text">תאריך: <span dir="ltr">{new Date().toLocaleDateString('he-IL')}</span></div><div className="meta-text">שעת הפקה: <span dir="ltr">{new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})}</span></div></div>
                            </div>
                            <div className="table-container">
                                <table className="official-table">
                                    <thead><tr><th style={{ width: '8%' }}>מס'</th><th style={{ width: '35%' }}>שם משפחה ופרטי</th><th style={{ width: '25%' }}>מגמה</th><th style={{ width: '12%' }}>כיתה</th><th style={{ width: '20%' }}>סטטוס</th></tr></thead>
                                    <tbody>
                                        {releasedOnly.length > 0 ? releasedOnly.map((s, idx) => {
                                            const statusText = s.status === 'נוכח' ? 'מאושר' : s.status;
                                            return <tr key={s.id}><td>{idx + 1}</td><td>{s.lastName} {s.firstName}</td><td>{s.major}</td><td>{s.className}</td><td>✓ {statusText}</td></tr>;
                                        }) : <tr><td colSpan="5" style={{ padding: '20px !important' }}>לא נמצאו רשומות בדוח זה.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                            <div className="official-footer">
                                <div className="summary-box">סה"כ מאושרים: <b>{releasedOnly.length}</b></div>
                                <div className="signature-box">
                                    <div className="signer-name">{signerName}</div>
                                    <div className="signature-line">
                                        {finalSignatureImg ? <img src={finalSignatureImg} alt="חתימה" /> : <div style={{height:'50px'}}></div>}
                                    </div>
                                    <div className="signer-role">{userRole}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-xl mx-auto pb-24 relative no-print">
                    <header className="glass-header text-white p-6 sticky top-0 z-40 rounded-b-[40px] shadow-2xl">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-4">
                                <div className="bg-amber-400 p-2.5 rounded-2xl text-navy"><AnchorIcon size={28} /></div>
                                <h1 className="font-black text-xl">{userRole}</h1>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setShowSignatureModal(true)} className="bg-amber-500 hover:bg-amber-400 text-navy px-4 py-2 rounded-xl font-black text-[10px] shadow-lg transition">סיום והפקה</button>
                                <button onClick={resetList} className="p-2.5 bg-white/10 hover:bg-white/20 rounded-xl border border-white/10 transition"><AnchorIcon size={18} color="#fbbf24"/></button>
                                <button onClick={goBack} className="p-2.5 bg-white/10 hover:bg-white/20 rounded-xl border border-white/10 transition">✕</button>
                            </div>
                        </div>
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                            <button onClick={() => setActiveFilter({type:'All', value:'All'})} className={`px-4 py-1.5 rounded-full text-[11px] whitespace-nowrap filter-btn ${activeFilter.type === 'All' ? 'active-filter' : ''}`}>הכל ({globalStudents.filter(s=>!s.isDone).length})</button>
                            {MajorsList.map(m => <button key={m} onClick={() => setActiveFilter({type:'Major', value:m})} className={`px-4 py-1.5 rounded-full text-[11px] whitespace-nowrap filter-btn ${activeFilter.type === 'Major' && activeFilter.value === m ? 'active-filter' : ''}`}>{m}</button>)}
                        </div>
                        <div className="flex gap-2 overflow-x-auto no-scrollbar border-t border-white/10 pt-3">
                            {classesList.map(c => <button key={c} onClick={() => setActiveFilter({type:'Class', value:c})} className={`px-4 py-1.5 rounded-full text-[10px] whitespace-nowrap filter-btn ${activeFilter.type === 'Class' && activeFilter.value === c ? 'active-filter' : ''}`}>{c}</button>)}
                        </div>
                    </header>

                    <main className="p-5 space-y-6">
                        <section className="modern-card p-6 border-b-4 border-amber-400">
                            <h3 className="text-sm font-black text-white mb-5">{editingStudent ? 'עריכת חניך' : 'רישום חניך'}</h3>
                            <div className="grid grid-cols-2 gap-3 mb-3">
                                <input className="p-4 bg-slate-700 border border-slate-600 rounded-xl text-white font-bold outline-none focus:border-amber-400" placeholder="שם" value={editingStudent ? editingStudent.firstName : formData.firstName} onChange={e => editingStudent ? setEditingStudent({...editingStudent, firstName: e.target.value}) : setFormData({...formData, firstName: e.target.value})} />
                                <input className="p-4 bg-slate-700 border border-slate-600 rounded-xl text-white font-bold outline-none focus:border-amber-400" placeholder="משפחה" value={editingStudent ? editingStudent.lastName : formData.lastName} onChange={e => editingStudent ? setEditingStudent({...editingStudent, lastName: e.target.value}) : setFormData({...formData, lastName: e.target.value})} />
                            </div>
                            <div className="grid grid-cols-2 gap-3 mb-4">

                                        <div onClick={() => setEditingStudent(s)} className="cursor-pointer">
                                            <div className="font-extrabold text-xl text-white">{s.firstName} {s.lastName}</div>

                                    <div className="flex gap-2">
                                        <select className="flex-1 p-3.5 bg-slate-700 border border-slate-600 text-white rounded-xl font-bold text-xs outline-none focus:border-amber-400" value={s.status} onChange={e => database.ref(`students/${s.id}`).update({status: e.target.value})}>

                                            <option value="חולה בבית">חולה בבית</option>
                                            <option value="שעות ביציאה">שעות ביציאה</option>
                                            <option value="חופשה מיוחדת">חופשה מיוחדת</option>
                                            <option value="יצא מוקדם">יצא מוקדם</option>
                                        </select>
                                        <button onClick={() => database.ref(`students/${s.id}`).update({isDone: true, status: s.status === 'ממתין' ? 'נוכח' : s.status})} className="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3.5 rounded-xl font-black text-xs shadow-lg transition">שחרר ✓</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {showSignatureModal && (
                        <div className="fixed inset-0 bg-slate-900/95 z-[9999] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-slate-800 border-2 border-slate-600 w-full max-w-sm rounded-3xl p-6 shadow-2xl relative">
                                <button onClick={() => setShowSignatureModal(false)} className="absolute top-4 left-4 text-slate-400 hover:text-white text-xl">✕</button>
                                <h3 className="text-2xl font-black text-center mb-6 text-white mt-2">סיום מסדר יציאה</h3>
                                <div className="mb-6">
                                    <label className="text-sm font-bold text-slate-300 mb-2 block">שם מלא (חותם/ת):</label>
                                    <input className="w-full p-4 bg-slate-700 border border-slate-600 text-white rounded-xl font-bold mb-4 outline-none focus:border-amber-400" placeholder="ישראל ישראלי" value={signerName} onChange={e => setSignerName(e.target.value)} />
                                    
                                    <label className="text-sm font-bold text-slate-300 mb-2 block">חתימה (צייר כאן):</label>

                                </div>
                                <div className="flex flex-col gap-3">

                                    <button onClick={handleGenerateOfflineQR} className="w-full bg-slate-700 hover:bg-slate-600 border border-slate-500 text-white py-4 rounded-xl font-bold transition">📷 יצירת ברקוד אופליין למערכת</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showQR && (
                        <div className="fixed inset-0 bg-slate-900 z-[9999] flex flex-col items-center justify-center p-6 text-center overflow-y-auto">

        };

        const AbBayitView = ({ userRole, handleLogout }) => {
            const [rNum, setRNum] = useState(""); const [checks, setChecks] = useState({}); const [reports, setReports] = useState([]); const [isPrint, setIsPrint] = useState(false); const [signerName, setSignerName] = useState("");
            const [finalSignatureImg, setFinalSignatureImg] = useState(null);
            
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            const startDrawing = (e) => {
                if(!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
                const rect = canvasRef.current.getBoundingClientRect(); const offsetX = (e.touches && e.touches[0]) ? e.touches[0].clientX - rect.left : e.nativeEvent.offsetX; const offsetY = (e.touches && e.touches[0]) ? e.touches[0].clientY - rect.top : e.nativeEvent.offsetY;
                ctx.moveTo(offsetX, offsetY); setIsDrawing(true);
            };
            const draw = (e) => {
                if (!isDrawing || !canvasRef.current) return;
                const rect = canvasRef.current.getBoundingClientRect(); const offsetX = (e.touches && e.touches[0]) ? e.touches[0].clientX - rect.left : e.nativeEvent.offsetX; const offsetY = (e.touches && e.touches[0]) ? e.touches[0].clientY - rect.top : e.nativeEvent.offsetY;
                canvasRef.current.getContext('2d').lineTo(offsetX, offsetY); canvasRef.current.getContext('2d').stroke();
            };
            const stopDrawing = () => setIsDrawing(false);
            const clearSignature = () => { if(canvasRef.current) canvasRef.current.getContext('2d').clearRect(0, 0, 320, 150); };

            const nextRoom = () => { if(!rNum) return alert("חובה להזין מספר חדר"); setReports([...reports, { room: rNum, checks: checks }]); setRNum(""); setChecks({}); alert(`הנתונים לחדר ${rNum} נשמרו. עברו לחדר הבא.`); };

            const handlePrint = () => {
                if(reports.length===0) return alert("לא נבדקו חדרים.");
                if(!signerName.trim()) return alert("חובה להזין את שם ממלא הדו\"ח לפני הדפסה.");
                if(canvasRef.current) setFinalSignatureImg(canvasRef.current.toDataURL("image/png"));
                setIsPrint(true);
            };

            if (isPrint) {
                return (
                    <div className="bg-slate-900 print:bg-white print:text-black min-h-screen print:min-h-0 p-4 print:p-0 print-modal-fix" dir="rtl">

                            <div className="flex justify-center gap-3">
                                <button onClick={() => setTimeout(() => window.print(), 200)} className="bg-emerald-500 hover:bg-emerald-400 text-slate-900 px-6 py-3 rounded-xl font-black shadow-lg transition">🖨️ שמור/הדפס PDF</button>
                                <button onClick={() => { setReports([]); setIsPrint(false); setSignerName(""); setFinalSignatureImg(null); }} className="bg-red-600 hover:bg-red-500 text-white px-6 py-3 rounded-xl font-bold transition">איפוס נתונים לאחר הפקה</button>
                                <button onClick={()=>setIsPrint(false)} className="bg-slate-700 hover:bg-slate-600 text-white px-6 py-3 rounded-xl font-bold transition">חזור לעריכה</button>
                            </div>
                        </div>
                        
                        <div className="official-print-wrapper shadow-2xl print:shadow-none">
                            <div className="official-header">
                                <div className="header-right"><h1 className="school-name">ביה"ס לקציני ים עכו</h1><h2 className="report-title">דוח ביקורת מגורים וסדר כללי</h2></div>
                                <div className="header-left"><div className="meta-text">תאריך: <span dir="ltr">{new Date().toLocaleDateString('he-IL')}</span></div></div>
                            </div>
                            <div className="table-container">
                                <table className="official-table mt-4">
                                    <thead><tr><th style={{width:'20%'}}>מספר חדר</th><th>הערות / ליקויים שנמצאו בביקורת</th></tr></thead>
                                    <tbody>
                                        {reports.map((r, i) => { 
                                            const badChecks = Object.keys(r.checks).filter(k => r.checks[k]); 
                                            return <tr key={i}><td style={{fontWeight:'900', fontSize:'16pt'}}>{r.room}</td><td style={{color: badChecks.length>0?'#dc2626':'#059669', fontWeight:'700', textAlign: 'right', paddingRight: '10px !important'}}>{badChecks.length > 0 ? "נמצאו ליקויים: " + badChecks.join(", ") : "✓ חדר תקין לחלוטין - אין ליקויים"}</td></tr>; 
                                        })}
                                    </tbody>
                                </table>
                            </div>
                            <div className="official-footer mt-8 border-t-2 pt-4 flex justify-between">
                                <div className="summary-box">סה"כ חדרים שנבדקו בסיור: <b>{reports.length}</b></div>
                                <div className="signature-box">
                                    <div className="signer-name">{signerName}</div>
                                    <div className="signature-line">
                                        {finalSignatureImg ? <img src={finalSignatureImg} alt="חתימה" /> : <div style={{height: '50px'}}></div>}
                                    </div>
                                    <div className="signer-role">{userRole}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-32">
                    <header className="bg-slate-800 border-b border-slate-700 text-white p-6 sticky top-0 z-40 rounded-b-3xl shadow-lg flex justify-between items-center">
                        <div><h1 className="text-2xl font-black text-amber-400">ביקורת מגורים</h1><h2 className="text-sm font-bold text-slate-400">{userRole}</h2></div>
                        <button onClick={handleLogout} className="bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded text-sm font-bold transition">התנתק</button>
                    </header>
                    <main className="p-4 max-w-md mx-auto">
                        <div className="modern-card p-6 border-t-4 border-blue-500 mb-6">
                            <label className="block text-slate-400 font-bold mb-2">מספר החדר הנבדק כעת:</label>
                            <input type="number" placeholder="לדוגמה: 101" value={rNum} onChange={e=>setRNum(e.target.value)} className="w-full p-5 bg-slate-700 border border-slate-600 rounded-xl text-2xl font-black text-center text-white mb-6 focus:border-blue-500 outline-none" />
                            <label className="block font-bold mb-3 text-slate-300">סמן ביקורות לחדר הרלוונטי:</label>
                            <div className="grid grid-cols-2 gap-3">
                                {ROOM_CHECKS.map(opt => (
                                    <button key={opt} onClick={() => setChecks({...checks, [opt]: !checks[opt]})} className={`p-4 rounded-xl font-bold text-sm border transition-colors ${checks[opt] ? 'bg-red-900/50 border-red-500 text-red-200' : 'bg-slate-700 border-slate-600 text-slate-300 hover:bg-slate-600'}`}>{opt} {checks[opt] ? '❌' : ''}</button>
                                ))}
                            </div>
                            <button onClick={nextRoom} className="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold shadow-lg transition">שמור חדר ועבור להבא</button>
                        </div>
                        {reports.length > 0 && <div className="p-4 bg-emerald-900/50 text-emerald-300 rounded-xl font-bold text-center border border-emerald-700 shadow-sm mb-6">✅ נבדקו עד כה {reports.length} חדרים בסיור זה.</div>}
                        
                        <div className="modern-card p-6 border-t-4 border-amber-400">
                            <h3 className="font-bold text-white mb-4">פרטי מגיש הדו"ח</h3>
                            <label className="text-sm font-bold text-slate-300 mb-2 block">שם ממלא הדו"ח (חובה):</label>
                            <input value={signerName} onChange={e=>setSignerName(e.target.value)} className="w-full p-4 mb-4 bg-slate-700 border border-slate-600 text-white font-bold rounded-xl outline-none focus:border-amber-400" placeholder="לדוגמה: ישראל ישראלי" />
                            
                            <label className="text-sm font-bold text-slate-300 mb-2 block">חתימת אב הבית:</label>
                            <canvas ref={canvasRef} width={320} height={150} className="signature-canvas w-full mb-2 mx-auto" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                            <button onClick={clearSignature} className="text-sm text-red-400 hover:text-red-300 font-bold underline text-center block w-full">נקה חתימה</button>
                        </div>
                    </main>
                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-slate-800 border-t border-slate-700">
                        <button onClick={handlePrint} className="w-full max-w-md mx-auto block btn-gold py-4 rounded-xl font-black text-xl shadow-lg">הפק דו"ח ביקורת</button>
                    </div>
                </div>
            );
        };

        const KabatView = ({ userRole, isEmergency, systemAlerts, cloudReports, handleLogout }) => {
            const activeAlerts = Object.entries(systemAlerts || {}).filter(([k,v]) => v.active);
            const emergencyReports = cloudReports.filter(r => r.type && r.type.includes('חירום'));
            const [selectedReport, setSelectedReport] = useState(null);

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-slate-800 text-white p-6 rounded-b-3xl shadow-lg mb-6 flex justify-between items-center border-b border-slate-700">
                        <div><h1 className="text-2xl font-black text-amber-400">ביטחון ובטיחות</h1><h2 className="text-sm font-bold text-slate-400">{userRole}</h2></div>
                        <button onClick={handleLogout} className="text-sm bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded font-bold shadow transition">התנתק</button>
                    </header>
                    <div className="p-4 max-w-xl mx-auto space-y-6">
                        <EmergencyComms userRole={userRole} />

                        <div className={`p-6 rounded-3xl shadow-2xl transition-all duration-500 border-4 ${isEmergency ? 'bg-red-900 border-red-500' : 'bg-slate-800 border-slate-700'}`}>
                            <h3 className={`font-black text-2xl mb-2 ${isEmergency ? 'text-white' : 'text-red-500'}`}>🚨 כפתור מצב חירום</h3>
                            <p className={`text-sm mb-6 font-bold ${isEmergency ? 'text-red-200' : 'text-slate-400'}`}>לחיצה תשתלט על כל המסכים במערכת ותחייב העברת דיווח נוכחות מיידי.</p>
                            <button onClick={() => { const newState = !isEmergency; database.ref('system/emergency').set(newState); if(newState) alert("מצב חירום הופעל!"); }} className={`w-full py-5 rounded-2xl font-black text-xl shadow-lg transition ${isEmergency ? 'bg-white text-red-700 border-b-4 border-red-800' : 'bg-red-600 hover:bg-red-500 text-white border-b-4 border-red-800'}`}>
                                {isEmergency ? 'הפסק מצב חירום (חזל"ש)' : 'הפעל מצב חירום עכשיו!'}

                        <div className="modern-card p-6 border-t-4 border-red-500 bg-red-950/30">
