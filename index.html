                            {emergencyReports.length === 0 ? (
                                <div className="text-center text-red-300/50 font-bold p-4 bg-red-900/20 rounded-xl border border-red-900">טרם התקבלו דוחות חירום מהכיתות.</div>
                            ) : (
                                <div className="space-y-3">
                                    {emergencyReports.map(r => (
                                        <div key={r.reportId} className="bg-red-900 border border-red-700 p-4 rounded-xl flex justify-between items-center shadow">
                                            <div>
                                                <div className="font-bold text-white text-lg">{r.author}</div>
                                                <div className="text-xs text-red-200 mt-1">{new Date(r.timestamp).toLocaleTimeString('he-IL')}</div>

                                </div>

                        <div className="modern-card p-6 border-t-4 border-amber-500">

                                <div className="space-y-3">
                                    {activeAlerts.map(([key, alert]) => (
                                        <div key={key} className="bg-slate-700 border-r-4 border-amber-500 p-4 rounded-xl shadow-sm flex justify-between items-center">
                                            <div>
                                                <div className="font-black text-white text-lg">{alert.text} <span className="text-[10px] bg-amber-400/20 px-2 py-0.5 rounded text-amber-400 ml-1 font-bold">סרוק</span></div>
                                                <div className="text-xs text-slate-400 font-bold mt-1">דווח ע"י: {alert.author} | שעה: {alert.time}</div>
                                            </div>
                                            <button onClick={() => database.ref(`system/alerts/${key}`).update({active: false})} className="bg-amber-500 hover:bg-amber-400 text-slate-900 px-4 py-2 rounded-xl font-black shadow text-sm transition">אשר הודעה</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                    {selectedReport && <ReportViewerModal report={selectedReport} onClose={() => setSelectedReport(null)} />}
                </div>
            );
        };

        const OfficerView = ({ userRole, accessCodes, offlineReports, setOfflineReports, cloudReports, handleLogout }) => {
            const [showQRS, setShowQRS] = useState(false); const [compareMode, setCompareMode] = useState(false);
            const [selectedReport, setSelectedReport] = useState(null);
            const [selectedForCompare, setSelectedForCompare] = useState([]);

            const officerReports = cloudReports.filter(r => r.type && !r.type.includes('חירום'));

            const toggleCompareSelection = (reportId) => {
                if (selectedForCompare.includes(reportId)) {
                    setSelectedForCompare(selectedForCompare.filter(id => id !== reportId));
                } else {
                    setSelectedForCompare([...selectedForCompare, reportId]);
                }
            };

            const runCompare = () => {
                const activeReportsToCompare = officerReports.filter(r => selectedForCompare.includes(r.reportId));
                const allReports = [...activeReportsToCompare, ...offlineReports];
                const reportedByKadars = []; const reportedByClinic = [];
                
                allReports.forEach(report => {
                    if (report.type === 'kmz') {
                        if (report.rows) report.rows.forEach(row => reportedByClinic.push({name: row.name, class: row.class}));
                    } else {
                        if (report.rows) report.rows.forEach(row => { if(['ק.מ.ז', 'מסדר חולים', 'חדר חולים'].includes(row.note)) reportedByKadars.push({name: row.name, class: row.class, author: report.author, note: row.note}); });
                    }
                });
                return reportedByKadars.map(kadarReport => {
                    const foundInClinic = reportedByClinic.find(c => c.name === kadarReport.name);
                    return { ...kadarReport, status: foundInClinic ? 'תקין (הגיע למרפאה)' : 'חריג - לא נרשם במרפאה!' };
                });
            };

            const changeKmzCode = () => {
                if(!confirm("החלפת קוד ק.מ.ז תשבית את הקוד הקודם. להמשיך?")) return;
                const updates = {}; Object.entries(accessCodes || {}).forEach(([code, data]) => { if(typeof data==='object' && data.type==='kmz') updates[code]=null; });
                const newCode = generateRandomCode(); updates[newCode] = { name: 'מרפאה', type: 'kmz' }; database.ref('access_codes').update(updates); alert("קוד הק.מ.ז החדש:\n" + newCode);
            };

            const deleteCloudReport = (reportId) => {
                if (confirm("למחוק דו\"ח זה מהענן? (פעולה זו אינה ניתנת לביטול)")) {
                    database.ref('reports_cloud/' + reportId).remove();
                    setSelectedForCompare(selectedForCompare.filter(id => id !== reportId));
                }
            };

            if (compareMode) {
                const compData = runCompare();
                return (
                    <div className="bg-slate-900 print:bg-white print:text-black min-h-screen print:min-h-0 p-4 print:p-0 print-modal-fix" dir="rtl">
                        <div className="no-print mb-6 text-center bg-slate-800 border border-slate-700 p-6 rounded-xl text-white max-w-3xl mx-auto shadow-xl">
                            <h2 className="text-2xl font-black text-amber-400 mb-4">דוח הצלבת חולים ממוחשב</h2>
                            <div className="flex justify-center gap-3">
                                <button onClick={()=>setTimeout(()=>window.print(), 200)} className="bg-emerald-500 hover:bg-emerald-400 text-slate-900 px-6 py-3 rounded-xl font-black shadow-lg transition">🖨️ שמור / הדפס דוח</button>
                                <button onClick={()=>setCompareMode(false)} className="bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-xl font-bold transition">חזור למערכת</button>
                            </div>
                        </div>
                        
                        <div className="official-print-wrapper shadow-2xl print:shadow-none">
                            <div className="official-header">
                                <div className="header-right"><h1 className="school-name">ביה"ס לקציני ים עכו</h1><h2 className="report-title">   דו"ח הצלבת נתוני מרפאה ורשימות קד"רים  </h2></div>
                                <div className="header-left"><div className="meta-text">תאריך: <span dir="ltr">{new Date().toLocaleDateString('he-IL')}</span></div></div>
                            </div>
                            <div className="table-container">
                                <table className="official-table mt-4">
                                    <thead><tr><th style={{width:'30%'}}>שם החניך</th><th style={{width:'15%'}}>כיתה</th><th style={{width:'20%'}}>דווח ע"י</th><th style={{width:'35%'}}>סטטוס מול מרפאה</th></tr></thead>
                                    <tbody>
                                        {compData.length === 0 ? <tr><td colSpan="4" style={{padding:'20px !important'}}>לא נמצאו חניכים שדווחו כחולים בשטח בדוחות שנבחרו.</td></tr> : null}
                                        {compData.map((d, i) => <tr key={i}><td style={{fontWeight:'900'}}>{d.name}</td><td>{d.class}</td><td>{d.author}</td><td style={{fontWeight:'900', color: d.status.includes('חריג') ? '#dc2626' : '#059669', background: d.status.includes('חריג') ? '#fee2e2 !important' : 'inherit'}}>{d.status}</td></tr>)}
                                    </tbody>
                                </table>
                            </div>
                            <div className="official-footer mt-8 border-t-2 pt-4 flex justify-between">
                                <div className="summary-box">סה"כ פערים שנמצאו: <b>{compData.filter(d=>d.status.includes('חריג')).length}</b></div>
                                <div className="signature-box"><div className="signature-line"></div><div className="signer-name">{userRole}</div><div className="signer-role">קצין תורן</div></div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-slate-800 text-white p-6 rounded-b-3xl shadow-lg mb-6 flex justify-between items-center border-b border-slate-700">
                        <div><h1 className="text-2xl font-black text-amber-400">קצין תורן</h1><h2 className="text-sm font-bold text-slate-400">{userRole}</h2></div>
                        <button onClick={handleLogout} className="text-sm bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded font-bold transition">התנתק</button>
                    </header>
                    <div className="p-4 max-w-xl mx-auto space-y-6">
                        <div className="modern-card p-6 border-t-4 border-purple-500">
                            <h3 className="font-bold text-white text-lg mb-4">דוחות כפר בענן ({officerReports.length})</h3>
                            <div className="max-h-60 overflow-y-auto space-y-2 pr-2">
                                {officerReports.length === 0 && <div className="text-slate-400 text-sm text-center">טרם התקבלו דוחות.</div>}
                                {officerReports.map(r => (
                                    <div key={r.reportId} className={`p-3 rounded-lg flex justify-between items-center border transition-colors ${selectedForCompare.includes(r.reportId) ? 'bg-slate-600 border-amber-400' : 'bg-slate-700 border-slate-600'}`}>
                                        <div className="flex items-center gap-3">
                                            <input 
                                                type="checkbox" 
                                                className="w-5 h-5 accent-amber-500"
                                                checked={selectedForCompare.includes(r.reportId)}
                                                onChange={() => toggleCompareSelection(r.reportId)}
                                            />
                                            <div>
                                                <div className="font-bold text-white text-sm">{r.author} <span className="text-slate-400 text-xs">({r.type === 'kmz' ? 'דו"ח מרפאה' : r.type})</span></div>
                                                <div className="text-xs text-amber-400 mt-1">{new Date(r.timestamp).toLocaleTimeString('he-IL')}</div>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setSelectedReport(r)} className="bg-slate-800 hover:bg-slate-900 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition border border-slate-500">צפה</button>
                                            <button onClick={() => deleteCloudReport(r.reportId)} className="bg-red-900/50 hover:bg-red-900 text-red-400 px-2 py-1.5 rounded-lg text-xs font-black transition border border-red-800">✕</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="mt-4 pt-4 border-t border-slate-600">
                                <h3 className="font-bold text-white text-sm mb-2">⚖️ מערכת השוואת חולים מול ק.מ.ז</h3>
                                <p className="text-xs text-slate-400 mb-3">סמן בתיבות את הדוחות (ק.מ.ז ודוחות קד"רים) ולחץ על השוואה.</p>
                                <button disabled={selectedForCompare.length === 0} onClick={()=>setCompareMode(true)} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-black shadow-lg transition disabled:opacity-50">בצע השוואה לדוחות המסומנים</button>
                            </div>
                        </div>

                        <div className="modern-card p-6 border-t-4 border-blue-500">
                            <h3 className="font-bold text-white text-lg mb-2">קבלת דוחות באופליין</h3>
                            <button onClick={()=>setShowQRS(true)} className="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black shadow-lg mb-3 flex items-center justify-center gap-2 transition">📷 סרוק ברקוד דוח מהשטח</button>
                            <div className="text-sm font-bold text-slate-300 text-center bg-slate-700 p-2 rounded-lg border border-slate-600">נשמרו מקומית: {offlineReports.length}</div>
                        </div>
                        <div className="modern-card p-6 border-t-4 border-amber-500">
                            <h3 className="font-bold text-white text-lg mb-2">ניהול הרשאת מרפאה</h3>
                            <button onClick={changeKmzCode} className="w-full bg-slate-700 hover:bg-slate-600 border border-slate-500 text-white py-4 rounded-xl font-bold shadow-sm transition">🔄 החלף קוד ק.מ.ז  </button>
                        </div>
                    </div>
                    {showQRS && <QRScanner onClose={()=>setShowQRS(false)} onResult={d=>{ 
                        setShowQRS(false); 
                        try{ 
                            const parsed = decompressReportFromQR(d);
                            setOfflineReports([...offlineReports, parsed]);
                            setSelectedReport(parsed); 
                            alert("דו\"ח אופליין נסרק בהצלחה ומוכן להדפסה!"); 
                        }catch(e){
                            alert("שגיאה בסריקת הברקוד. ודא שזה ברקוד אופליין תקין.");
                        } 
                    }}/>}
                    {selectedReport && <ReportViewerModal report={selectedReport} onClose={() => setSelectedReport(null)} />}
                </div>
            );
        };

        const KmzView = ({ userRole, handleLogout }) => {
            const [patients, setPatients] = useState([]); 
            const [form, setForm] = useState({name:'', class:'', timeIn:''}); 
            const [showQR, setShowQR] = useState(false); 
            const [qrPayload, setQrPayload] = useState(""); 
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [signerName, setSignerName] = useState("");
            
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            const startDrawing = (e) => {
                if(!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
                const rect = canvasRef.current.getBoundingClientRect(); const offsetX = (e.touches && e.touches[0]) ? e.touches[0].clientX - rect.left : e.nativeEvent.offsetX; const offsetY = (e.touches && e.touches[0]) ? e.touches[0].clientY - rect.top : e.nativeEvent.offsetY;
                ctx.moveTo(offsetX, offsetY); setIsDrawing(true);
            };
            const draw = (e) => {
                if (!isDrawing || !canvasRef.current) return;
                const rect = canvasRef.current.getBoundingClientRect(); const offsetX = (e.touches && e.touches[0]) ? e.touches[0].clientX - rect.left : e.nativeEvent.offsetX; const offsetY = (e.touches && e.touches[0]) ? e.touches[0].clientY - rect.top : e.nativeEvent.offsetY;
                canvasRef.current.getContext('2d').lineTo(offsetX, offsetY); canvasRef.current.getContext('2d').stroke();
            };
            const stopDrawing = () => setIsDrawing(false);
            const clearSignature = () => { if(canvasRef.current) canvasRef.current.getContext('2d').clearRect(0, 0, 320, 150); };

            const addPatient = () => { 
                if(!form.name || !form.class) return alert("יש להזין שם וכיתה."); 
                setPatients([...patients, {...form, id: generateRandomCode(), timeOut: ''}]); 
                setForm({name:'', class:'', timeIn:''}); 
            };
            
            const updatePatientOut = (id, timeOut) => {
                setPatients(patients.map(p => p.id === id ? { ...p, timeOut } : p));
            };

            const finish = async () => { 
                if (!signerName.trim()) return alert("חובה להזין את שם ממלא הדו\"ח (חובש/ת).");
                setIsSubmitting(true); 
                const signatureBase64 = canvasRef.current ? canvasRef.current.toDataURL("image/png") : null;
                
                const payload = { 
                    reportId: 'rep_מרפאה_kmz_daily',
                    author: userRole, 
                    signerName: signerName,
                    userRole: userRole,
                    type: 'kmz', 
                    timestamp: new Date().getTime(), 
                    rows: patients,
                    signature: signatureBase64
                }; 
                
                try { 
                    await database.ref(`reports_cloud/${payload.reportId}`).set(payload); 
                } catch(e) {} 
                
                setQrPayload(compressReportForQR(payload)); 
                setShowQR(true); 
                setPatients([]); 
                if(canvasRef.current) canvasRef.current.getContext('2d').clearRect(0, 0, 320, 150);
                setIsSubmitting(false); 
            };

            return (
                <div className="min-h-screen pb-24">
                    <header className="bg-emerald-900 border-b border-emerald-700 text-white p-6 rounded-b-3xl shadow-lg mb-6 flex justify-between items-center">
                        <div><h1 className="text-2xl font-black text-white">דו"ח מרפאה</h1><h2 className="text-sm font-bold text-emerald-300">{userRole}</h2></div>
                        <button onClick={handleLogout} className="text-sm bg-emerald-800 hover:bg-emerald-700 px-3 py-1 rounded font-bold transition">התנתק</button>
                    </header>
                    <main className="p-4 max-w-md mx-auto space-y-4">
                        <div className="modern-card p-6">
                            <h3 className="font-bold text-white mb-4">רישום חניך למסדר חולים</h3>
                            <input value={form.name} onChange={e=>setForm({...form, name:e.target.value})} placeholder="שם הקדט" className="w-full p-4 border border-slate-600 rounded-xl bg-slate-700 text-white font-bold mb-3 outline-none focus:border-emerald-500" />
                            <div className="grid grid-cols-2 gap-3 mb-4">
                                <input value={form.class} onChange={e=>setForm({...form, class:e.target.value})} placeholder="כיתה (לדוג: ג/3)" className="p-4 border border-slate-600 rounded-xl bg-slate-700 text-white font-bold outline-none focus:border-emerald-500" />
                                <div className="flex flex-col gap-1">
                                    <span className="text-xs text-slate-400 font-bold">שעת כניסה</span>
                                    <input type="time" value={form.timeIn} onChange={e=>setForm({...form, timeIn:e.target.value})} className="p-3 border border-slate-600 rounded-xl bg-slate-700 text-white font-bold outline-none focus:border-emerald-500 text-center" />
                                </div>
                            </div>
                            <button onClick={addPatient} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-black text-lg shadow-lg transition">הוסף לרשימת המרפאה</button>
                        </div>
                        {patients.length > 0 && (
                            <div className="space-y-3">
                                <h4 className="font-bold text-slate-400 mr-2">נרשמו היום ({patients.length}):</h4>
                                {patients.map(p => (
                                    <div key={p.id} className="bg-slate-800 p-4 rounded-xl shadow-sm border-r-4 border-emerald-500 font-bold flex flex-col gap-2 text-white border border-slate-700">
                                        <div className="flex justify-between items-center">
                                            <span>{p.name} <span className="text-xs text-slate-400">({p.class})</span></span>
                                            <button onClick={() => setPatients(patients.filter(pat => pat.id !== p.id))} className="text-red-400 text-xs bg-red-900/40 px-2 py-1 rounded">הסר</button>
                                        </div>
                                        <div className="flex gap-2 items-center mt-2">
                                            <div className="flex-1 bg-slate-700 px-3 py-2 rounded-lg text-sm text-center">נכנס: {p.timeIn || '--:--'}</div>
                                            <div className="flex-1 flex flex-col">
                                                <input type="time" value={p.timeOut || ''} onChange={(e) => updatePatientOut(p.id, e.target.value)} className="w-full bg-slate-700 text-white px-2 py-2 rounded-lg border border-slate-600 outline-none text-center text-sm focus:border-emerald-400" />
                                                <span className="text-[10px] text-slate-400 text-center mt-0.5">שעת יציאה</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {patients.length > 0 && (
                            <div className="modern-card p-6 mt-6 border-t-4 border-emerald-500">
                                <label className="text-sm font-bold text-slate-300 mb-2 block">שם החובש/ת מדווח/ת (חובה):</label>
                                <input className="w-full p-4 bg-slate-700 border border-slate-600 text-white rounded-xl font-bold mb-4 outline-none focus:border-emerald-400" placeholder="לדוגמה: ישראל ישראלי..." value={signerName} onChange={e => setSignerName(e.target.value)} />
                                
                                <label className="text-sm font-bold text-slate-300 mb-2 block">חתימת מרפאה:</label>
                                <canvas ref={canvasRef} width={320} height={150} className="signature-canvas w-full mb-2 mx-auto" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                                <button onClick={clearSignature} className="text-sm text-red-400 hover:text-red-300 font-bold underline text-center block w-full">נקה חתימה</button>
                            </div>
                        )}
                    </main>
                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-slate-800 border-t border-slate-700">
                        <button disabled={patients.length===0 || isSubmitting} onClick={finish} className="w-full max-w-md mx-auto block btn-gold py-4 rounded-xl font-black text-xl shadow-lg disabled:opacity-50">חתום ושלח דו"ח מרפאה לענן</button>
                    </div>
                    {showQR && (
                        <div className="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6 text-center">
                            <h2 className="text-2xl font-black text-amber-400 mb-2">דוח ק.מ.ז נשלח לענן</h2>
                            <p className="text-white font-bold mb-4">הרשימה אופסה למקרה שתרצה לפתוח דו"ח חדש.</p>
                            <div className="bg-white p-4 rounded-3xl shadow-2xl mb-8 border-4 border-amber-400">
                                <img src={generateQR(qrPayload)} alt="QR Code" className="mx-auto" />
                            </div>
                            <button onClick={() => setShowQR(false)} className="w-full max-w-xs bg-slate-700 hover:bg-slate-600 py-4 rounded-xl font-black text-white text-xl transition">חזור למרפאה</button>
                        </div>
                    )}
                </div>
            );
        };

        const ScannerView = ({ userRole, offlineReports, setOfflineReports, handleLogout }) => {
            const [txt, setTxt] = useState(""); const [showQRS, setShowQRS] = useState(false);
            const sendAlert = () => { if(!txt) return; database.ref('system/alerts').push({ text: txt, time: new Date().toLocaleTimeString('he-IL'), active: true, author: userRole }); setTxt(""); alert("ההודעה שודרה."); };

            return (
                <div className="min-h-screen pb-20">
                    <header className="mb-8 bg-slate-800 p-6 rounded-b-3xl shadow border-b border-slate-700 flex justify-between items-center border-t-4 border-amber-400">
                        <div><h2 className="text-2xl font-black text-white">{userRole}</h2></div>
                        <button onClick={handleLogout} className="text-slate-300 bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl font-bold transition">התנתק</button>
                    </header>
                    <div className="p-4 max-w-md mx-auto space-y-6">
                        <EmergencyComms userRole={userRole} />

                        <div className="modern-card p-6">
                            <h3 className="font-bold text-white mb-2 text-lg">דיווח סריקות לקב"ט</h3>
                            <input value={txt} onChange={e=>setTxt(e.target.value)} placeholder="לדוגמה: בניין מעבדות..." className="w-full p-4 border border-slate-600 rounded-xl bg-slate-700 text-white font-bold mb-4 outline-none focus:border-amber-400 text-lg" />
                            <button onClick={sendAlert} className="w-full btn-gold py-4 rounded-xl font-black text-xl shadow-lg">שדר דיווח סריקה</button>
                        </div>
                        <div className="modern-card p-6 border-t-4 border-blue-500">
                            <h3 className="font-bold text-white mb-2 text-lg">איסוף דוחות מהשטח (אופליין)</h3>
                            <button onClick={()=>setShowQRS(true)} className="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black text-lg shadow-lg flex justify-center items-center gap-2 transition">📷 פתח קורא ברקודים</button>
                            <p className="text-center font-bold text-slate-400 mt-4 text-sm">נאספו עד כה: {offlineReports.length} דוחות</p>
                        </div>
                    </div>
                    {showQRS && <QRScanner onClose={()=>setShowQRS(false)} onResult={d=>{ 
                        setShowQRS(false); 
                        try { 
                            const parsed = decompressReportFromQR(d);
                            setOfflineReports([...offlineReports, parsed]); 
                            alert("הדו\"ח נשאב למכשיר בהצלחה!"); 
                        }catch(e){alert("שגיאה בסריקה. ודא שסרקת ברקוד אופליין.");} 
                    }}/>}
                </div>
            );
        };

        const MedicView = ({ userRole, userType, offlineReports, setOfflineReports, handleLogout }) => {
            const [showQRS, setShowQRS] = useState(false); const [showQRTransfer, setShowQRTransfer] = useState(false);
            const icon = userType === 'firefighter' ? '🧯' : '⚕️';

            return (
                <div className="min-h-screen pb-20">
                    <header className="mb-8 bg-slate-800 p-6 rounded-b-3xl shadow flex justify-between items-center border-b-4 border-red-600">
                        <div><h2 className="text-2xl font-black text-white">{userRole}</h2></div>
                        <button onClick={handleLogout} className="text-slate-300 bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl font-bold transition">התנתק</button>
                    </header>
                    <div className="p-4 max-w-md mx-auto space-y-6">
                        <EmergencyComms userRole={userRole} />

                        <div className="modern-card p-8 text-center border-t-4 border-red-500">
                            <div className="text-6xl mb-4">{icon}</div>
                            <button onClick={()=>setShowQRS(true)} className="w-full bg-red-600 hover:bg-red-500 text-white py-4 rounded-xl font-black text-xl shadow-lg transition">פתח מצלמה לסריקה</button>
                        </div>
                        <div className="bg-slate-800 border border-slate-700 text-white p-6 rounded-3xl shadow text-center">
                            <h4 className="font-bold text-lg mb-2">דוחות במכשיר: {offlineReports.length}</h4>
                            <button disabled={offlineReports.length===0} onClick={()=>setShowQRTransfer(true)} className="mt-2 w-full bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white py-3 rounded-xl font-black disabled:opacity-50 transition">מסור נתונים (הצג QR)</button>
                        </div>
                    </div>
                    {showQRS && <QRScanner onClose={()=>setShowQRS(false)} onResult={d=>{ 
                        setShowQRS(false); 
                        try {
                            const parsed = decompressReportFromQR(d);
                            setOfflineReports([...offlineReports, parsed]); 
                            alert("דו\"ח שטח נקלט במכשיר!");
                        }catch(e){alert("שגיאת סריקה");} 
                    }}/>}
                    {showQRTransfer && (
                        <div className="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6 text-center">
                            <div className="bg-white p-4 rounded-3xl shadow-2xl mb-8 border-4 border-amber-400">
                                <img src={generateQR(JSON.stringify(offlineReports))} alt="QR Code" className="mx-auto" />
                            </div>
                            <button onClick={() => setShowQRTransfer(false)} className="w-full max-w-xs bg-slate-700 hover:bg-slate-600 py-4 rounded-xl font-black text-white transition">חזור</button>
                        </div>
                    )}
                </div>
            );
        };

        const ManagementView = ({ userRole, students, isEmergency, systemAlerts, cloudReports, handleLogout }) => {
            const [selectedReport, setSelectedReport] = useState(null);
            const [viewClassFilter, setViewClassFilter] = useState("All");
            
            const allClassesList = [...new Set(students.map(s => s.className?.trim()).filter(Boolean))].sort();
            const displayedStudents = viewClassFilter === "All" ? students : students.filter(s => s.className === viewClassFilter);

            return (
                <div className="min-h-screen pb-20">
                    <header className="mb-6 bg-slate-800 text-white p-6 rounded-b-3xl shadow-xl flex justify-between items-center border-b border-slate-700">
                        <div><h1 className="text-2xl font-black text-amber-400">פיקוד עליון ומנהלה</h1><h2 className="text-sm font-bold text-slate-400">{userRole}</h2></div>
                        <button onClick={handleLogout} className="text-sm bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-lg font-bold transition">התנתק</button>
                    </header>
                    <div className="p-4 max-w-xl mx-auto space-y-4">
                        <div className="grid grid-cols-2 gap-4">
                            <div className="modern-card p-6 text-center">
                                <div className="text-5xl font-black text-white mb-1">{students.length}</div>
                                <div className="text-sm font-bold text-slate-400">חניכים במערכת</div>
                            </div>
                            <div className="bg-emerald-900 border border-emerald-700 p-6 rounded-3xl shadow text-center text-white">
                                <div className="text-5xl font-black mb-1">{students.filter(s=>s.isDone).length}</div>
                                <div className="text-sm font-bold text-emerald-200">מאושרים לשחרור</div>
                            </div>
                        </div>
                        
                        <div className={`p-6 rounded-3xl shadow-lg text-center border-4 ${isEmergency ? 'bg-red-900 border-red-500 text-white' : 'bg-slate-800 border-slate-700 text-slate-300'}`}>
                            <h3 className="font-black text-2xl mb-1">סטטוס כפר</h3>
                            <p className="font-bold text-lg">{isEmergency ? '🚨 מצב חירום פעיל בשטח!' : 'שגרה - אין מצב חירום'}</p>
                        </div>
                        
                        <div className="modern-card p-6 border-t-4 border-indigo-500">
                            <h3 className="font-bold text-white text-lg mb-3">סטטוס חניכים במערכת</h3>
                            <select className="w-full p-3 bg-slate-700 border border-slate-600 rounded-xl text-white font-bold outline-none mb-4" value={viewClassFilter} onChange={e=>setViewClassFilter(e.target.value)}>
                                <option value="All">כל הכפר</option>
                                {allClassesList.map(c => <option key={c} value={c}>כיתה {c}</option>)}
                            </select>
                            
                            <div className="max-h-60 overflow-y-auto space-y-2 pr-2">
                                {displayedStudents.length === 0 ? <div className="text-slate-400 text-sm">אין נתונים.</div> : null}
                                {displayedStudents.map(s => (
                                    <div key={s.id} className="bg-slate-700 p-2 rounded flex justify-between items-center text-sm border border-slate-600">
                                        <div className="font-bold text-white">{s.firstName} {s.lastName} <span className="text-xs text-slate-400">({s.className})</span></div>
                                        <div className={`font-bold px-2 py-1 rounded ${s.status === 'נוכח' ? 'bg-emerald-900 text-emerald-300' : 'bg-slate-800 text-slate-300'}`}>{s.status}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        <div className="modern-card p-6 border-t-4 border-blue-500">
                            <h3 className="font-bold text-white text-lg mb-4">ארכיון דוחות כפר ({cloudReports.length})</h3>
                            <div className="max-h-60 overflow-y-auto space-y-2 pr-2">
                                {cloudReports.length === 0 && <div className="text-slate-400 text-sm text-center">אין דוחות במערכת כעת.</div>}
                                {cloudReports.map(r => (
                                    <div key={r.reportId} className="bg-slate-700 p-3 rounded-lg flex justify-between items-center border border-slate-600">
                                        <div>
                                            <div className="font-bold text-white text-sm">{r.author} <span className="text-slate-400 text-xs">({r.type})</span></div>
                                            <div className="text-xs text-amber-400 mt-1">{new Date(r.timestamp).toLocaleTimeString('he-IL')}</div>
                                        </div>
                                        <button onClick={() => setSelectedReport(r)} className="bg-slate-800 hover:bg-slate-900 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition border border-slate-500">צפה</button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="modern-card p-6 border-t-4 border-amber-400">
                            <h3 className="font-black text-white text-lg mb-4">לוג פעילות אחרון</h3>
                            {Object.values(systemAlerts || {}).length === 0 ? <p className="text-sm text-slate-500 font-bold text-center">אין נתונים מהשטח.</p> : null}
                            <div className="space-y-2">
                                {Object.values(systemAlerts || {}).reverse().slice(0, 5).map((al, i) => (
                                    <div key={i} className={`p-3 rounded-xl text-sm font-bold border-r-4 ${al.active ? 'bg-amber-900/40 border-amber-500 text-amber-200' : 'bg-slate-700 border-slate-600 text-slate-300'}`}>
                                        <span className="font-mono ml-2 opacity-70">[{al.time}]</span> {al.text} ({al.author})
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    {selectedReport && <ReportViewerModal report={selectedReport} onClose={() => setSelectedReport(null)} />}
                </div>
            );
        };

        function App() {
            const [view, setView] = useState("login");
            const [userRole, setUserRole] = useState("");
            const [userType, setUserType] = useState("");
            const [userCode, setUserCode] = useState("");
            
            const [students, setStudents] = useState([]);
            const [accessCodes, setAccessCodes] = useState({});
            
            const [isEmergency, setIsEmergency] = useState(false);
            const [systemAlerts, setSystemAlerts] = useState({});
            const [popupMsg, setPopupMsg] = useState("");
            
            const [offlineReports, setOfflineReports] = useState([]);
            const [cloudReports, setCloudReports] = useState([]);

            useEffect(() => {
                const studentsRef = database.ref('students');
                studentsRef.on('value', snap => {
                    const data = snap.val();
                    if (!data) { setStudents([]); return; }
                    const cleanList = Object.keys(data).map(k => ({ ...data[k], id: k, status: (data[k].isDone && data[k].status === 'ממתין') ? 'נוכח' : (data[k].status || 'ממתין') }));
                    setStudents(cleanList);
                });
                
                const codesRef = database.ref('access_codes');
                codesRef.on('value', snap => setAccessCodes(snap.val() || {}));
                
                const emergencyRef = database.ref('system/emergency');
                emergencyRef.on('value', snap => setIsEmergency(snap.val() || false));
                
                const alertsRef = database.ref('system/alerts');
                alertsRef.on('value', snap => {
                    const data = snap.val() || {}; setSystemAlerts(data);
                    if (['kabat', 'safety_comm'].includes(userType)) {
                        const newAlerts = Object.values(data).filter(a => a.active);
                        if (newAlerts.length > 0) {
                            setPopupMsg(`📍 סריקה: ${newAlerts[newAlerts.length - 1].text}`);
                            setTimeout(() => setPopupMsg(""), 5000);
                        }
                    }
                });

                const commsRef = database.ref('system/comms');
                let initialCommsLoaded = false;
                commsRef.once('value').then(() => initialCommsLoaded = true);
                commsRef.on('child_added', snap => {
                    if (!initialCommsLoaded) return;
                    const data = snap.val();
                    if (EMERGENCY_ROLES.includes(userType)) {
                        setPopupMsg(`🔴 ${data.author}: ${data.text}`);
                        setTimeout(() => setPopupMsg(""), 6000);
                    }
                });

                const reportsRef = database.ref('reports_cloud');
                reportsRef.on('value', snap => {
                    const data = snap.val();
                    if(data) {
                        setCloudReports(Object.values(data).sort((a,b) => b.timestamp - a.timestamp));
                    } else {
                        setCloudReports([]);
                    }
                });
                
                return () => { studentsRef.off(); codesRef.off(); emergencyRef.off(); alertsRef.off(); reportsRef.off(); commsRef.off(); };
            }, [userType]);

            const handleLogout = () => { setUserRole(""); setUserType(""); setUserCode(""); setView("login"); };

            const setGodRole = (rType, rName) => {
                setUserRole(`${rName} (God Mode)`);
                setUserType(rType);
                setUserCode("GOD_MODE_USER");
                
                if (rType === 'admin') setView("admin");
                else if (rType === 'madrich') setView("madrich_dash");
                else if (rType === 'kadar') setView("kadar_menu");
                else if (rType === 'ab_bayit') setView("ab_bayit");
                else if (['kabat', 'safety_comm'].includes(rType)) setView("kabat_dash");
                else if (rType === 'scanner') setView("scanner_dash");
                else if (['firefighter', 'medic'].includes(rType)) setView("medic_dash");
                else if (rType === 'officer') setView("officer_dash");
                else if (rType === 'kmz') setView("kmz_dash");
                else if (['cadet_comm', 'deputy_comm', 'village_mgr'].includes(rType)) setView("management_dash");
                else setView("kadar_menu");
            };

            const handleLoginAttempt = (inputCode) => {
                if (inputCode === "1808") { setUserRole("אדמין מערכת"); setUserType("admin"); setUserCode("1808"); setView("admin"); }
                else if (inputCode === "GOD" || inputCode === "9999") {
                    setUserRole("Master Key"); setUserType("god"); setUserCode("GOD"); setView("god_mode");
                }
                else if (accessCodes && accessCodes[inputCode]) {
                    const codeData = accessCodes[inputCode];
                    const rName = typeof codeData === 'object' ? codeData.name : codeData;
                    const rType = typeof codeData === 'object' ? codeData.type : 'kadar';
                    setUserRole(rName); setUserType(rType); setUserCode(inputCode);
                    
                    if (rType === 'madrich') setView("madrich_dash");
                    else if (rType === 'kadar') setView("kadar_menu");
                    else if (rType === 'ab_bayit') setView("ab_bayit");
                    else if (['kabat', 'safety_comm'].includes(rType)) setView("kabat_dash");
                    else if (rType === 'scanner') setView("scanner_dash");
                    else if (['firefighter', 'medic'].includes(rType)) setView("medic_dash");
                    else if (rType === 'officer') setView("officer_dash");
                    else if (rType === 'kmz') setView("kmz_dash");
                    else if (['cadet_comm', 'deputy_comm', 'village_mgr'].includes(rType)) setView("management_dash");
                    else setView("kadar_menu");
                } else { alert("קוד הגישה שגוי או אינו קיים במערכת."); }
            };

            const renderCurrentView = () => {
                try {
                    switch(view) {
                        case "login": return <LoginView isEmergency={isEmergency} onLoginAttempt={handleLoginAttempt} />;
                        case "admin": return <AdminView accessCodes={accessCodes} students={students} handleLogout={handleLogout} />;
                        case "god_mode": return <GodModeView setGodRole={setGodRole} handleLogout={handleLogout} />;
                        case "madrich_dash": return <MadrichView userRole={userRole} userCode={userCode} accessCodes={accessCodes} students={students} cloudReports={cloudReports} setView={setView} handleLogout={handleLogout} />;
                        case "kadar_menu": return <KadarMenu userRole={userRole} userType={userType} isEmergency={isEmergency} setView={setView} handleLogout={handleLogout} />;
                        case "kadar_form_nochachut": return <KadarForm userRole={userRole} userType={userType} userCode={userCode} accessCodes={accessCodes} students={students} formType="nochachut" setView={setView} />;
                        case "kadar_form_kibui_orot": return <KadarForm userRole={userRole} userType={userType} userCode={userCode} accessCodes={accessCodes} students={students} formType="kibui_orot" setView={setView} />;
                        case "kadar_form_boker": return <KadarForm userRole={userRole} userType={userType} userCode={userCode} accessCodes={accessCodes} students={students} formType="boker" setView={setView} />;
                        case "kadar_form_knisa": return <KadarForm userRole={userRole} userType={userType} userCode={userCode} accessCodes={accessCodes} students={students} formType="knisa" setView={setView} />;
                        case "kadar_form_emergency": return <KadarForm userRole={userRole} userType={userType} userCode={userCode} accessCodes={accessCodes} students={students} formType="emergency" setView={setView} />;
                        case "kadar_exit_original": return <OriginalExitApp globalStudents={students} userRole={userRole} goBack={() => setView(userType === 'madrich' ? "madrich_dash" : "kadar_menu")} />;
                        case "ab_bayit": return <AbBayitView userRole={userRole} handleLogout={handleLogout} />;
                        case "kabat_dash": return <KabatView userRole={userRole} isEmergency={isEmergency} systemAlerts={systemAlerts} cloudReports={cloudReports} handleLogout={handleLogout} />;
                        case "scanner_dash": return <ScannerView userRole={userRole} offlineReports={offlineReports} setOfflineReports={setOfflineReports} handleLogout={handleLogout} />;
                        case "medic_dash": return <MedicView userRole={userRole} userType={userType} offlineReports={offlineReports} setOfflineReports={setOfflineReports} handleLogout={handleLogout} />;
                        case "officer_dash": return <OfficerView userRole={userRole} accessCodes={accessCodes} offlineReports={offlineReports} setOfflineReports={setOfflineReports} cloudReports={cloudReports} handleLogout={handleLogout} />;
                        case "kmz_dash": return <KmzView userRole={userRole} handleLogout={handleLogout} />;
                        case "management_dash": return <ManagementView userRole={userRole} students={students} isEmergency={isEmergency} systemAlerts={systemAlerts} cloudReports={cloudReports} handleLogout={handleLogout} />;
                        default: return <LoginView isEmergency={isEmergency} onLoginAttempt={handleLoginAttempt} />;
                    }
                } catch (error) {
                    console.error(error);
                    return <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white font-bold text-center p-8">אירעה שגיאה בטעינת המסך. אנא רענן את הדף.<br/>(Error Boundary caught an exception)</div>;
                }
            };

            return (
                <>
                    {popupMsg && <div className="toast-popup" style={{backgroundColor: popupMsg.includes('🔴') ? '#dc2626' : '#f59e0b'}}>{popupMsg}</div>}
                    {renderCurrentView()}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
   <script>
    // הגדרת גרסה - בכל פעם שאתה עושה שינוי קריטי, פשוט תשנה את המספר כאן (למשל ל-7)
    const APP_VERSION = '6.1'; 

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `
                const CACHE_NAME = 'master-os-cache-v' + '${APP_VERSION}';
                const ASSETS = [
                    location.pathname,
                    'https://unpkg.com/react@18/umd/react.production.min.js',
                    'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
                    'https://cdn.tailwindcss.com',
                    'https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js',
                    'https://unpkg.com/html5-qrcode'
                ];

                self.addEventListener('install', event => {
                    self.skipWaiting();
                    event.waitUntil(
                        caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS))
                    );
                });

                self.addEventListener('activate', event => {
                    event.waitUntil(
                        caches.keys().then(keys => Promise.all(
                            keys.map(key => {
                                if (key !== CACHE_NAME) return caches.delete(key);
                            })
                        ))
                    );
                    return self.clients.claim();
                });

                self.addEventListener('fetch', event => {
                    // אסטרטגיה: קודם רשת, אם נכשל - זיכרון (הכי בטוח לעדכונים)
                    event.respondWith(
                        fetch(event.request).catch(() => caches.match(event.request))
                    );
                });
            `;

            const blob = new Blob([swCode], { type: 'application/javascript' });
            // כאן הקסם: הוספת ?v= לכתובת גורמת לדפדפן להוריד את הסקריפט מחדש
            const swUrl = URL.createObjectURL(blob) + '?v=' + APP_VERSION;

            navigator.serviceWorker.register(swUrl).then(reg => {
                console.log('SW Registered. Version:', APP_VERSION);
                
                // אם נמצאה גרסה חדשה בזמן שהאפליקציה פתוחה
                reg.onupdatefound = () => {
                    const newWorker = reg.installing;
                    newWorker.onstatechange = () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            alert("נמצא עדכון גרסה! המערכת תתרענן כעת.");
                            window.location.reload();
                        }
                    };
                };
            });
        });
    }
</script>
</body>

</html>
